name: DyrakArmy 10 Games Matrix

on:
  pull_request:
    paths:
      - worker/**
      - downloader/**
      - hf_space/**
      - .github/workflows/games-10-check.yml
  push:
    branches:
      - main
    paths:
      - worker/**
      - downloader/**
      - hf_space/**
      - .github/workflows/games-10-check.yml
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: games-10-${{ github.ref }}
  cancel-in-progress: true

jobs:
  worker-tests:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: worker
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm
          cache-dependency-path: worker/package-lock.json
      - run: npm ci
      - name: Typecheck all game handlers
        run: npm run typecheck
      - name: Run all server-side game tests
        run: npm test
      - name: Run deterministic Games 1-10 simulation
        run: node scripts/games-1-10-simulation.mjs
      - name: Run deep sequential Games 1-10 validation
        run: node scripts/games-1-10-deep-validation.mjs
      - name: Wrangler packaging dry-run
        run: npx wrangler deploy --dry-run --config wrangler.jsonc --outdir .wrangler-games-10

  game-matrix:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        game:
          - queue-commander
          - beat-hunter
          - dyrakarmy-arena
          - format-forge
          - server-defender
          - metadata-detective
          - link-runner
          - archive-raid
          - latency-strike
          - bot-vs-human
    steps:
      - uses: actions/checkout@v4
      - name: Validate route and public catalog contract
        shell: bash
        run: |
          set -euo pipefail
          game='${{ matrix.game }}'
          grep -q "$game" worker/games-10-validation-manifest.json
          grep -q "$game" worker/public/platform/games-v14.js
          grep -q "$game" worker/public/platform/platform-public.js
          case "$game" in
            dyrakarmy-arena)
              grep -q 'handleDyrakArmyArenaApi' worker/src/platform_v2.ts
              grep -q "$game" worker/public/sw.js
              ;;
            archive-raid)
              grep -q 'handleArchiveRaidApi' worker/src/platform_v2.ts
              grep -q 'protected_content_access: false' worker/src/archive_raid.ts
              grep -q "$game" worker/public/sw.js
              ;;
            latency-strike)
              grep -q 'handleLatencyStrikeGameApi' worker/src/platform_v2.ts
              grep -q 'setGameScore' worker/src/latency_strike_native.ts
              grep -q "$game" worker/public/sw.js
              ;;
            *)
              grep -q "$game" worker/src/challenge_games.ts
              grep -q 'handleChallengeGamesApi' worker/src/platform_v2.ts
              grep -q 'CHALLENGE_SLUGS.map' worker/src/platform_v2.ts
              grep -q 'CHALLENGE_GAME_SLUGS' worker/public/sw.js
              ;;
          esac
      - name: Validate game client syntax
        shell: bash
        run: |
          set -euo pipefail
          case '${{ matrix.game }}' in
            dyrakarmy-arena) node --check worker/public/games/dyrakarmy-arena/arena.js ;;
            archive-raid) node --check worker/public/games/archive-raid/raid.js ;;
            latency-strike) node --check worker/public/games/latency-strike/game.js ;;
            *) node --check worker/public/games/challenge/challenge.js ;;
          esac

  integration-contracts:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
      - name: Validate shared profile and migrations
        shell: bash
        run: |
          set -euo pipefail
          node --check worker/public/platform/games-v14.js
          node --check worker/public/platform/platform-public.js
          node --check worker/public/games/challenge/challenge.js
          node --check worker/public/games/archive-raid/raid.js
          node --check worker/public/games/dyrakarmy-arena/arena.js
          node --check worker/public/games/latency-strike/game.js
          node --check worker/public/sw.js
          grep -q 'handleChallengeGamesApi' worker/src/platform_v2.ts
          grep -q 'handleChallengeGamesTelegramWebhook' worker/src/platform_v2.ts
          grep -q 'handleDyrakArmyArenaApi' worker/src/platform_v2.ts
          grep -q 'handleArchiveRaidApi' worker/src/platform_v2.ts
          grep -q 'handleLatencyStrikeGameApi' worker/src/platform_v2.ts
          grep -q 'isPlatformModuleEnabled(env, slug)' worker/src/platform_v2.ts
          grep -q 'CREATE TABLE IF NOT EXISTS challenge_game_runs' worker/migrations/0016_dyrakarmy_games_1_10.sql
          grep -q 'CREATE TABLE IF NOT EXISTS archive_raid_runs' worker/migrations/0015_archive_raid_v1.sql
          grep -q '"shared_profile":true' worker/migrations/0016_dyrakarmy_games_1_10.sql
          grep -q 'game_profiles' worker/src/challenge_games.ts
          grep -q 'total_xp' worker/src/challenge_games.ts
          grep -q 'download-killer-static-v15-games-1-10' worker/public/sw.js
          grep -q 'download-killer-static-v16-dyrakarmy-dashboard' worker/public/sw.js
      - name: Validate all Telegram game commands
        shell: bash
        run: |
          set -euo pipefail
          for command in queuegame beat arena formatgame defender detective linkrunner raid game botvhuman; do
            grep -q "command: '$command'" worker/scripts/setup-telegram-platform.mjs
          done
      - name: Validate safety boundaries
        shell: bash
        run: |
          set -euo pipefail
          grep -q 'protected_content_access: false' worker/src/archive_raid.ts
          if grep -R -n -E 'eval\(|new Function\(' worker/src/challenge_games.ts worker/src/archive_raid.ts worker/public/games/challenge worker/public/games/archive-raid; then
            echo 'Executable code construction found in game system.'
            exit 1
          fi
          if grep -R -n -E 'javascript:|data:text/html' worker/public/games/challenge worker/public/games/archive-raid; then
            echo 'Unsafe browser URL scheme found in game client.'
            exit 1
          fi

  hf-free-public-live:
    runs-on: ubuntu-latest
    timeout-minutes: 50
    steps:
      - uses: actions/checkout@v4
      - name: Prepare Hugging Face free-public bundle
        run: |
          set -euo pipefail
          rm -rf .hf-stage
          mkdir -p .hf-stage
          rsync -a --delete --exclude node_modules --exclude .wrangler --exclude .dev.vars worker/ .hf-stage/worker/
          rsync -a --delete --exclude __pycache__ --exclude .pytest_cache downloader/ .hf-stage/downloader/
          cp hf_space/platform_hf.ts .hf-stage/worker/src/platform_hf.ts
          cp hf_space/wrangler.hf.jsonc .hf-stage/worker/wrangler.hf.jsonc
          rm -f .hf-stage/worker/src/platform_hf.test.ts
          cp hf_space/README.md .hf-stage/README.md
          cp hf_space/Dockerfile .hf-stage/Dockerfile
          cp hf_space/start.sh .hf-stage/start.sh
          cp hf_space/import-cloudflare-state.sh .hf-stage/import-cloudflare-state.sh
          cp hf_space/render-dev-vars.mjs .hf-stage/render-dev-vars.mjs
          cp hf_space/standalone-preflight.mjs .hf-stage/standalone-preflight.mjs
          cp hf_space/standalone-supervisor.mjs .hf-stage/standalone-supervisor.mjs
          test -f .hf-stage/downloader/app/main.py
      - name: Build free-public Docker image
        run: docker build -t dyrakarmy-hf-free-public:test .hf-stage
      - name: Start free-public runtime
        run: |
          docker run -d --name dyrakarmy-hf-free-public \
            -p 17860:7860 \
            -e HF_BACKEND_MODE=free-public \
            -e DOWNLOADER_API_KEY=test-hf-local-downloader-key \
            -e PUBLIC_BASE_URL=https://dyrakarmy-dyrakarmy-platform.hf.space \
            -e CORS_ORIGINS=https://dyrakarmy-dyrakarmy-platform.hf.space \
            dyrakarmy-hf-free-public:test
          ready=0
          for attempt in $(seq 1 120); do
            if curl -fsS http://127.0.0.1:17860/api/hf-runtime/health >/tmp/hf-runtime.json; then
              ready=1
              break
            fi
            if ! docker inspect -f '{{.State.Running}}' dyrakarmy-hf-free-public 2>/dev/null | grep -q true; then
              docker logs dyrakarmy-hf-free-public || true
              exit 1
            fi
            sleep 2
          done
          test "$ready" -eq 1
          node -e "const p=require('/tmp/hf-runtime.json'); if(!p.ok||p.mode!=='free-public'||p.state_authority!=='hugging-face-ephemeral'||p.cloudflare_dependency!==false||!p.downloader?.ok||p.downloader?.mode!=='local-container'||p.downloader?.auth_status!==404) process.exit(1)"
          docker exec dyrakarmy-hf-free-public sh -lc 'test -n "$DOWNLOADER_API_KEY"'
          docker exec dyrakarmy-hf-free-public sh -lc 'test "$(curl -sS -o /dev/null -w "%{http_code}" -H "X-API-Key: $DOWNLOADER_API_KEY" http://127.0.0.1:8081/internal/files/not-found)" = "404"'
      - name: Validate every public game sequentially
        shell: bash
        run: |
          set -euo pipefail
          games=(queue-commander beat-hunter dyrakarmy-arena format-forge server-defender metadata-detective link-runner archive-raid latency-strike bot-vs-human)
          for game in "${games[@]}"; do
            echo "Validating $game"
            curl -fsS "http://127.0.0.1:17860/games/$game/" -o "/tmp/$game.html"
            test -s "/tmp/$game.html"
            curl -fsS "http://127.0.0.1:17860/api/games/$game/config" -o "/tmp/$game-config.json"
            GAME="$game" node -e "const p=require('/tmp/'+process.env.GAME+'-config.json'); if(!p.ok) process.exit(1); const id=p.game||p.slug; if(id!==process.env.GAME) process.exit(1)"
            curl -fsS "http://127.0.0.1:17860/api/games/$game/leaderboard?limit=5" -o "/tmp/$game-leaderboard.json"
            GAME="$game" node -e "const p=require('/tmp/'+process.env.GAME+'-leaderboard.json'); if(!p.ok||!Array.isArray(p.entries)) process.exit(1)"
            echo "PASS $game"
          done
      - name: Capture runtime diagnostics
        if: always()
        run: docker logs dyrakarmy-hf-free-public || true
      - name: Cleanup
        if: always()
        run: docker rm -f dyrakarmy-hf-free-public >/dev/null 2>&1 || true
