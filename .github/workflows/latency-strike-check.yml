name: Latency Strike v1 Checks

on:
  pull_request:
    paths:
      - worker/src/latency_strike.ts
      - worker/src/latency_strike.test.ts
      - worker/src/latency_strike_bot.ts
      - worker/src/latency_strike_native.ts
      - worker/src/latency_strike_native.test.ts
      - worker/src/platform_v2.ts
      - worker/public/games/latency-strike/**
      - worker/public/platform/product-redesign-v20.css
      - worker/public/sw.js
      - worker/public/manifest.webmanifest
      - worker/scripts/setup-telegram-platform.mjs
      - worker/migrations/0012_latency_strike_v1.sql
      - .github/workflows/latency-strike-check.yml
      - .github/workflows/deploy-web-platform.yml
  push:
    branches: [main]
    paths:
      - worker/src/latency_strike.ts
      - worker/src/latency_strike.test.ts
      - worker/src/latency_strike_bot.ts
      - worker/src/latency_strike_native.ts
      - worker/src/latency_strike_native.test.ts
      - worker/src/platform_v2.ts
      - worker/public/games/latency-strike/**
      - worker/public/platform/product-redesign-v20.css
      - worker/public/sw.js
      - worker/public/manifest.webmanifest
      - worker/scripts/setup-telegram-platform.mjs
      - worker/migrations/0012_latency_strike_v1.sql
      - .github/workflows/latency-strike-check.yml
      - .github/workflows/deploy-web-platform.yml

permissions:
  contents: read

jobs:
  validate:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: worker
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm
          cache-dependency-path: worker/package-lock.json
      - run: npm ci
      - name: Typecheck Worker
        run: npm run typecheck
      - name: Run Worker and game tests
        run: npm test
      - name: Validate game JavaScript
        run: |
          node --check public/games/latency-strike/game.js
          node --check public/games/latency-strike/native-bridge.js
          node --check public/sw.js
          node --check scripts/setup-telegram-platform.mjs
      - name: Validate complete integration and Product System contract
        run: |
          grep -q 'data-product-generation="20"' public/games/latency-strike/index.html
          grep -q 'data-da-surface="game"' public/games/latency-strike/index.html
          grep -q '/platform/product-redesign-v20.css?v=20.0.0' public/games/latency-strike/index.html
          grep -q 'https://telegram.org/js/games.js' public/games/latency-strike/index.html
          grep -q 'native-bridge.js?v=1.0.0' public/games/latency-strike/index.html
          grep -q 'body\[data-da-surface="game"\]' public/platform/product-redesign-v20.css
          grep -q '/api/games/latency-strike/session' src/latency_strike.ts
          grep -q '/api/games/latency-strike/score' src/latency_strike.ts
          grep -q '/api/games/latency-strike/equip' src/latency_strike.ts
          grep -q '/api/games/latency-strike/leaderboard' src/latency_strike.ts
          grep -q 'frame_champion' src/latency_strike.ts
          grep -q 'icon_crown' src/latency_strike.ts
          grep -q 'badge_queue_master' src/latency_strike.ts
          grep -q 'waveform_void' src/latency_strike.ts
          grep -q 'theme_gold' src/latency_strike.ts
          grep -q 'title_queue_master' src/latency_strike.ts
          grep -q "command: 'game'" src/latency_strike_bot.ts
          grep -q "command: 'rewards'" src/latency_strike_bot.ts
          grep -q "telegramRequest.*'sendGame'\|'sendGame'" src/latency_strike_bot.ts
          grep -q 'game_short_name' src/latency_strike_bot.ts
          grep -q 'answerInlineQuery' src/latency_strike_bot.ts
          grep -q 'createLatencyStrikeNativeLaunch' src/latency_strike_bot.ts
          grep -q 'setGameScore' src/latency_strike_native.ts
          grep -q 'createSyntheticTelegramInitData' src/latency_strike_native.ts
          grep -q 'handleLatencyStrikeGameApi' src/platform_v2.ts
          grep -q 'handleLatencyStrikeTelegramWebhook' src/platform_v2.ts
          grep -q 'tg://resolve?domain=${links.username}&game=latency_strike' src/platform_v2.ts
          grep -q 'CREATE TABLE IF NOT EXISTS game_profiles' migrations/0012_latency_strike_v1.sql
          grep -q 'CREATE TABLE IF NOT EXISTS game_runs' migrations/0012_latency_strike_v1.sql
          grep -q 'CREATE TABLE IF NOT EXISTS game_unlocks' migrations/0012_latency_strike_v1.sql
          grep -q '/games/latency-strike/' public/manifest.webmanifest
          grep -q '/games/latency-strike/native-bridge.js?v=1.0.0' public/sw.js
          grep -q 'Verify Cloudflare Git production deployment' ../.github/workflows/deploy-web-platform.yml
          grep -q 'Production smoke test for platform, software and Games 1-10' ../.github/workflows/deploy-web-platform.yml
