name: Materialize DyrakArmy Governance v2

on:
  push:
    branches:
      - feature/platform-governance-v2
    paths:
      - '.bootstrap/governance-v2.part*'
      - '.github/workflows/materialize-governance-v2.yml'
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: governance-v2-materialize
  cancel-in-progress: false

jobs:
  materialize-and-validate:
    if: github.event_name == 'workflow_dispatch' || !contains(github.event.head_commit.message, '[governance-materialized]')
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Checkout feature branch
        uses: actions/checkout@v4
        with:
          ref: feature/platform-governance-v2
          fetch-depth: 0

      - name: Reconstruct reviewed source payload
        shell: bash
        run: |
          set -euo pipefail
          cat .bootstrap/governance-v2.part* > /tmp/governance-v2.b64
          base64 --decode /tmp/governance-v2.b64 > /tmp/governance-v2.tgz
          mkdir -p /tmp/governance-v2
          tar -xzf /tmp/governance-v2.tgz -C /tmp/governance-v2
          test -s /tmp/governance-v2/platform_governance.ts
          test -s /tmp/governance-v2/platform_v3.ts
          test -s /tmp/governance-v2/0017_platform_governance_v2.sql
          test -s /tmp/governance-v2/control-v2/index.html

      - name: Materialize Governance v2 files
        shell: bash
        run: |
          set -euo pipefail
          install -D /tmp/governance-v2/platform_governance.ts worker/src/platform_governance.ts
          install -D /tmp/governance-v2/platform_v3.ts worker/src/platform_v3.ts
          install -D /tmp/governance-v2/platform_governance.test.ts worker/src/platform_governance.test.ts
          install -D /tmp/governance-v2/0017_platform_governance_v2.sql worker/migrations/0017_platform_governance_v2.sql
          rm -rf worker/public/control-v2
          mkdir -p worker/public/control-v2
          cp -a /tmp/governance-v2/control-v2/. worker/public/control-v2/
          install -D /tmp/governance-v2/platform-governance-simulation.mjs worker/scripts/platform-governance-simulation.mjs
          install -D /tmp/governance-v2/platform-governance-v2.yml .github/workflows/platform-governance-v2.yml
          install -D /tmp/governance-v2/PLATFORM_GOVERNANCE_V2.md PLATFORM_GOVERNANCE_V2.md
          install -D /tmp/governance-v2/wrangler.jsonc worker/wrangler.jsonc
          rm -rf .bootstrap

      - name: Install Worker dependencies
        working-directory: worker
        run: npm ci

      - name: Strict TypeScript validation
        working-directory: worker
        run: npm run typecheck

      - name: Governance unit tests
        working-directory: worker
        run: npx vitest run src/platform_governance.test.ts

      - name: Deterministic governance simulation
        working-directory: worker
        run: node scripts/platform-governance-simulation.mjs

      - name: Browser and service-worker syntax
        working-directory: worker
        run: |
          node --check public/control-v2/control-v2.js
          node --check public/control-v2/sw.js

      - name: Cloudflare packaging dry run
        working-directory: worker
        run: npx wrangler deploy --dry-run --outdir dist-governance-v2

      - name: Verify no production deployment marker
        shell: bash
        run: |
          set -euo pipefail
          node - <<'NODE'
          const fs = require('fs');
          const report = JSON.parse(fs.readFileSync('worker/platform-governance-simulation-report.json', 'utf8'));
          if (!report.ok) throw new Error('Governance simulation failed');
          if (report.checks?.production_deploy_triggered !== false) {
            throw new Error('Production deployment safety assertion failed');
          }
          NODE

      - name: Commit validated readable sources
        shell: bash
        run: |
          set -euo pipefail
          rm -rf worker/dist-governance-v2
          git config user.name 'DyrakArmy CI'
          git config user.email 'actions@users.noreply.github.com'
          git add -A
          if git diff --cached --quiet; then
            echo 'No materialized changes to commit.'
            exit 0
          fi
          git commit -m '[governance-materialized] Integrate Platform Governance v2'
          git push origin HEAD:feature/platform-governance-v2
