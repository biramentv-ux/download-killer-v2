name: Platform v18 One-shot Version Compatibility

on:
  push:
    branches:
      - feature/platform-v18-i18n-downloader-telegram-archive
    paths:
      - .github/workflows/v18-one-shot-version-compat.yml

permissions:
  contents: write

jobs:
  patch:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: feature/platform-v18-i18n-downloader-telegram-archive
          fetch-depth: 0
      - name: Preserve public v17 compatibility marker
        run: |
          python - <<'PY'
          from pathlib import Path
          paths = [Path('worker/wrangler.jsonc'), Path('wrangler.jsonc'), Path('hf_space/wrangler.hf.jsonc')]
          for path in paths:
              text = path.read_text(encoding='utf-8')
              text = text.replace('"LATEST_WEB_VERSION": "18.0.0"', '"LATEST_WEB_VERSION": "17.0.0"')
              path.write_text(text, encoding='utf-8')
          PY
      - name: Commit patch when needed
        run: |
          if git diff --quiet; then exit 0; fi
          git config user.name github-actions[bot]
          git config user.email 41898282+github-actions[bot]@users.noreply.github.com
          git add worker/wrangler.jsonc wrangler.jsonc hf_space/wrangler.hf.jsonc
          git commit -m "fix(runtime): preserve public v17 compatibility marker"
          git push origin HEAD:feature/platform-v18-i18n-downloader-telegram-archive
