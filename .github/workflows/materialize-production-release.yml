name: Materialize Production Release

on:
  pull_request:
    branches:
      - main
    paths:
      - '.github/workflows/materialize-production-release.yml'
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: materialize-production-release
  cancel-in-progress: false

jobs:
  materialize:
    if: github.event_name == 'workflow_dispatch' || github.head_ref == 'release/dyrakarmy-production-v2'
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout clean release branch
        uses: actions/checkout@v4
        with:
          ref: release/dyrakarmy-production-v2
          fetch-depth: 0

      - name: Import validated Games 1-10 and Governance v2 release
        shell: bash
        run: |
          set -euo pipefail
          git fetch origin feature/dyrakarmy-games-1-10-v2
          git checkout origin/feature/dyrakarmy-games-1-10-v2 -- \
            .github/workflows/deploy-web-platform.yml \
            .github/workflows/platform-governance-v2.yml \
            .github/workflows/telegram-platform-check.yml \
            .github/workflows/unified-platform-check.yml \
            .gitignore \
            PLATFORM_GOVERNANCE_V2.md \
            worker/games-1-10-profile.json \
            worker/migrations/0016_dyrakarmy_games_1_10.sql \
            worker/migrations/0017_platform_governance_v2.sql \
            worker/public/control-v2/control-v2.css \
            worker/public/control-v2/control-v2.js \
            worker/public/control-v2/index.html \
            worker/public/control-v2/manifest.webmanifest \
            worker/public/control-v2/sw.js \
            worker/public/games/challenge/challenge.css \
            worker/public/games/challenge/challenge.js \
            worker/public/games/challenge/index.html \
            worker/public/platform/games-v14.css \
            worker/public/platform/games-v14.js \
            worker/public/platform/platform-public.js \
            worker/public/sw.js \
            worker/scripts/full-virtual-simulation.mjs \
            worker/scripts/games-1-10-simulation.mjs \
            worker/scripts/platform-governance-simulation.mjs \
            worker/scripts/setup-telegram-platform.mjs \
            worker/src/challenge_games.test.ts \
            worker/src/challenge_games.ts \
            worker/src/challenge_games_bot.ts \
            worker/src/dyrakarmy_arena_commands.ts \
            worker/src/platform_governance.test.ts \
            worker/src/platform_governance.ts \
            worker/src/platform_v2.ts \
            worker/src/platform_v3.ts \
            worker/wrangler.jsonc

          rm -f .github/workflows/materialize-production-release.yml
          git config user.name 'DyrakArmy Release Bot'
          git config user.email 'actions@users.noreply.github.com'
          git add -A
          git commit -m 'Materialize validated DyrakArmy production release'
          git push origin HEAD:release/dyrakarmy-production-v2
