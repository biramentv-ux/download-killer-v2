name: Apply Latency Strike Compatibility Fixes

on:
  push:
    branches:
      - feature/latency-strike-v1
    paths:
      - .github/workflows/latency-strike-codemod.yml

permissions:
  contents: write

jobs:
  patch:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: feature/latency-strike-v1
          fetch-depth: 0

      - name: Patch compatibility details
        shell: python
        run: |
          from pathlib import Path

          backend = Path('worker/src/latency_strike.ts')
          source = backend.read_text(encoding='utf-8')
          source = source.replace(
              "readEnvInt(env.TELEGRAM_MINIAPP_AUTH_MAX_AGE_SECONDS, 900, 60, 3600)",
              "Math.min(3600, Math.max(60, readEnvInt(env.TELEGRAM_MINIAPP_AUTH_MAX_AGE_SECONDS, 900)))",
          )
          backend.write_text(source, encoding='utf-8')

          sw = Path('worker/public/sw.js')
          source = sw.read_text(encoding='utf-8')
          source = source.replace(
              "const CACHE_NAME = 'download-killer-static-v13-latency-strike-v1';",
              "const CACHE_NAME = 'download-killer-static-v13-responsive';",
          )
          source = source.replace(
              "const LEGACY_CACHE_NAME = 'download-killer-static-v13-responsive';",
              "const LEGACY_CACHE_NAME = 'download-killer-static-v12.2.0';",
          )
          sw.write_text(source, encoding='utf-8')

          Path('.github/workflows/latency-strike-codemod.yml').unlink()

      - name: Verify fixes
        run: |
          grep -Fq 'Math.min(3600, Math.max(60, readEnvInt' worker/src/latency_strike.ts
          grep -Fq "download-killer-static-v13-responsive" worker/public/sw.js
          test ! -f .github/workflows/latency-strike-codemod.yml

      - name: Commit compatibility fixes
        run: |
          git config user.name "download-killer-games"
          git config user.email "actions@users.noreply.github.com"
          git add worker/src/latency_strike.ts worker/public/sw.js .github/workflows/latency-strike-codemod.yml
          git commit -m "Fix Latency Strike Worker and PWA compatibility"
          git push origin HEAD:feature/latency-strike-v1
