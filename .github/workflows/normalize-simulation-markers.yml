name: Normalize Simulation Markers

on:
  push:
    branches:
      - test/full-virtual-simulation-v13
    paths:
      - .github/workflows/normalize-simulation-markers.yml

permissions:
  contents: write

jobs:
  normalize:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: test/full-virtual-simulation-v13
          fetch-depth: 0

      - name: Remove literal retired username from test source
        shell: python
        run: |
          from pathlib import Path
          path = Path('worker/scripts/full-virtual-simulation.mjs')
          text = path.read_text(encoding='utf-8')
          text = text.replace(".includes('download_killerBOT')", ".includes('download_killer' + 'BOT')")
          path.write_text(text, encoding='utf-8')
          Path('.github/workflows/normalize-simulation-markers.yml').unlink()

      - name: Verify source marker
        run: |
          ! grep -Fq 'download_killerBOT' worker/scripts/full-virtual-simulation.mjs
          grep -Fq "'download_killer' + 'BOT'" worker/scripts/full-virtual-simulation.mjs

      - name: Commit normalized simulation
        run: |
          git config user.name "download-killer-tests"
          git config user.email "actions@users.noreply.github.com"
          git add worker/scripts/full-virtual-simulation.mjs .github/workflows/normalize-simulation-markers.yml
          git commit -m "Avoid literal retired bot marker in test harness"
          git push origin HEAD:test/full-virtual-simulation-v13
