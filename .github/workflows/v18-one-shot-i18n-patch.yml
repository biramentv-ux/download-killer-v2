name: Platform v18 One-shot i18n Patch

on:
  push:
    branches:
      - feature/platform-v18-i18n-downloader-telegram-archive
    paths:
      - .github/workflows/v18-one-shot-i18n-patch.yml
      - worker/public/platform/i18n-v18.js

permissions:
  contents: write

jobs:
  patch:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: feature/platform-v18-i18n-downloader-telegram-archive
          fetch-depth: 0
      - name: Prevent recursive language mutation
        run: |
          python - <<'PY'
          from pathlib import Path
          path = Path('worker/public/platform/i18n-v18.js')
          text = path.read_text(encoding='utf-8')
          old = "    document.documentElement.lang = lang;"
          new = "    if (document.documentElement.lang != lang) document.documentElement.lang = lang;"
          if old in text:
              text = text.replace(old, new, 1)
              path.write_text(text, encoding='utf-8')
          elif new not in text:
              raise SystemExit('Expected language assignment was not found')
          PY
      - name: Commit patch when needed
        run: |
          if git diff --quiet; then exit 0; fi
          git config user.name github-actions[bot]
          git config user.email 41898282+github-actions[bot]@users.noreply.github.com
          git add worker/public/platform/i18n-v18.js
          git commit -m "fix(i18n): prevent recursive language mutation"
          git push origin HEAD:feature/platform-v18-i18n-downloader-telegram-archive
