name: Reconcile Production Release

on:
  push:
    branches:
      - main
    paths:
      - '.github/workflows/reconcile-production-release.yml'
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: reconcile-production-release
  cancel-in-progress: false

jobs:
  reconcile:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout release branch
        uses: actions/checkout@v4
        with:
          ref: feature/dyrakarmy-games-1-10-v2
          fetch-depth: 0

      - name: Merge latest main and resolve expected workflow conflicts
        shell: bash
        run: |
          set -euo pipefail
          git config user.name 'DyrakArmy Release Bot'
          git config user.email 'actions@users.noreply.github.com'
          git fetch origin main
          set +e
          git merge --no-commit --no-ff origin/main
          set -e

          conflicts="$(git diff --name-only --diff-filter=U || true)"
          unexpected="$(printf '%s\n' "$conflicts" | grep -v -E '^(\.github/workflows/deploy-web-platform\.yml|\.github/workflows/unified-platform-check\.yml)$' || true)"
          if [ -n "$unexpected" ]; then
            echo "Unexpected merge conflicts:"
            printf '%s\n' "$unexpected"
            exit 1
          fi

          for file in .github/workflows/deploy-web-platform.yml .github/workflows/unified-platform-check.yml; do
            if printf '%s\n' "$conflicts" | grep -qx "$file"; then
              git checkout --theirs -- "$file"
            fi
          done

          python - <<'PY'
          from pathlib import Path

          def replace_once(source: str, old: str, new: str, label: str) -> str:
              if new in source:
                  return source
              if old not in source:
                  raise SystemExit(f'Missing marker: {label}')
              return source.replace(old, new, 1)

          deploy = Path('.github/workflows/deploy-web-platform.yml')
          text = deploy.read_text()
          text = replace_once(text,
              "          node --check public/control/control.js\n",
              "          node --check public/control/control.js\n          node --check public/control-v2/control-v2.js\n          node --check public/control-v2/sw.js\n",
              'deploy control-v2 syntax')
          text = replace_once(text,
              "          grep -q '/api/platform/control' public/control/control.js\n          grep -q '/api/platform/public' public/platform/platform-public.js\n",
              "          grep -q '/api/platform/control' public/control/control.js\n          grep -q 'DyrakArmy Control Center v2' public/control-v2/index.html\n          grep -q '/api/platform/governance' public/control-v2/control-v2.js\n          grep -q '/api/platform/public' public/platform/platform-public.js\n          grep -q 'handlePlatformGovernanceApi' src/platform_v3.ts\n          grep -q 'handlePlatformGovernanceTelegramWebhook' src/platform_v3.ts\n          grep -q '\"main\": \"src/platform_v3.ts\"' wrangler.jsonc\n",
              'deploy governance contracts')
          text = replace_once(text,
              "          grep -q 'CREATE TABLE IF NOT EXISTS challenge_game_runs' migrations/0016_dyrakarmy_games_1_10.sql\n",
              "          grep -q 'CREATE TABLE IF NOT EXISTS challenge_game_runs' migrations/0016_dyrakarmy_games_1_10.sql\n          grep -q 'CREATE TABLE IF NOT EXISTS platform_users' migrations/0017_platform_governance_v2.sql\n          grep -q 'CREATE TABLE IF NOT EXISTS platform_versions' migrations/0017_platform_governance_v2.sql\n          grep -q 'CREATE TABLE IF NOT EXISTS platform_sessions' migrations/0017_platform_governance_v2.sql\n",
              'deploy governance migrations')
          text = replace_once(text,
              "  deploy:\n    if: github.event_name != 'pull_request'\n    needs: validate\n    runs-on: ubuntu-latest\n    environment: production\n",
              "  deploy:\n    if: github.event_name == 'push' && github.ref == 'refs/heads/main'\n    needs: validate\n    runs-on: ubuntu-latest\n",
              'direct production condition')
          text = replace_once(text,
              "            control=\"$(curl -fsSL --retry 5 --retry-all-errors --retry-delay 5 --max-time 45 \"$base/control/?v=1.0.0\")\"\n            grep -q 'DyrakArmy Control Center' <<<\"$control\"\n            grep -q 'id=\"moduleList\"' <<<\"$control\"\n            grep -q 'id=\"contentList\"' <<<\"$control\"\n",
              "            control=\"$(curl -fsSL --retry 5 --retry-all-errors --retry-delay 5 --max-time 45 \"$base/control-v2/?v=2.0.0\")\"\n            grep -q 'DyrakArmy Control Center v2' <<<\"$control\"\n            grep -q 'id=\"moduleList\"' <<<\"$control\"\n            grep -q 'id=\"roleList\"' <<<\"$control\"\n            grep -q 'id=\"versionList\"' <<<\"$control\"\n",
              'deploy control-v2 smoke')
          text = replace_once(text,
              "          grep -q '\"control-center\"' <<<\"$registry\"\n\n          queue_config=",
              "          grep -q '\"control-center\"' <<<\"$registry\"\n\n          governance=\"$(curl -fsSL --retry 5 --retry-all-errors --retry-delay 5 --max-time 45 https://dyrakarmy.eu/api/platform/governance/health)\"\n          grep -Eq '\"ok\"[[:space:]]*:[[:space:]]*true' <<<\"$governance\"\n          grep -q '\"version\":\"2.0.0\"' <<<\"$governance\"\n\n          queue_config=",
              'deploy governance health')
          deploy.write_text(text)

          unified = Path('.github/workflows/unified-platform-check.yml')
          text = unified.read_text()
          text = replace_once(text,
              "          node --check public/control/control.js\n",
              "          node --check public/control/control.js\n          node --check public/control-v2/control-v2.js\n          node --check public/control-v2/sw.js\n",
              'unified control-v2 syntax')
          text = replace_once(text,
              "          grep -q \"isPlatformModuleEnabled\" src/platform_v2.ts\n",
              "          grep -q \"isPlatformModuleEnabled\" src/platform_v2.ts\n          grep -q \"handlePlatformGovernanceApi\" src/platform_v3.ts\n          grep -q \"handlePlatformGovernanceTelegramWebhook\" src/platform_v3.ts\n          grep -q \"return platformV2.fetch\" src/platform_v3.ts\n          grep -q '\"main\": \"src/platform_v3.ts\"' wrangler.jsonc\n",
              'unified platform-v3 wrapper')
          text = replace_once(text,
              "          grep -q \"platform_audit\" src/platform_control.ts\n",
              "          grep -q \"platform_audit\" src/platform_control.ts\n          grep -q \"type PlatformRole = 'owner' | 'admin' | 'editor' | 'moderator' | 'user'\" src/platform_governance.ts\n          grep -q \"identity.link.start\" src/platform_governance.ts\n          grep -q \"version.rollback\" src/platform_governance.ts\n          grep -q \"text/event-stream\" src/platform_governance.ts\n",
              'unified governance capabilities')
          text = replace_once(text,
              "          grep -q \"DyrakArmy Control Center\" public/control/index.html\n",
              "          grep -q \"DyrakArmy Control Center\" public/control/index.html\n          grep -q \"DyrakArmy Control Center v2\" public/control-v2/index.html\n          grep -q \"/api/platform/governance\" public/control-v2/control-v2.js\n",
              'unified control-v2 contracts')
          text = replace_once(text,
              "          grep -q \"CREATE TABLE IF NOT EXISTS challenge_game_runs\" migrations/0016_dyrakarmy_games_1_10.sql\n",
              "          grep -q \"CREATE TABLE IF NOT EXISTS challenge_game_runs\" migrations/0016_dyrakarmy_games_1_10.sql\n          grep -q \"CREATE TABLE IF NOT EXISTS platform_users\" migrations/0017_platform_governance_v2.sql\n          grep -q \"CREATE TABLE IF NOT EXISTS platform_versions\" migrations/0017_platform_governance_v2.sql\n          grep -q \"CREATE TABLE IF NOT EXISTS platform_sessions\" migrations/0017_platform_governance_v2.sql\n",
              'unified governance migrations')
          text = replace_once(text,
              "          if grep -R -n -E 'eval\\(|new Function\\(' src/platform_control.ts src/challenge_games.ts public/control public/games/challenge public/games/archive-raid; then\n",
              "          if grep -R -n -E 'eval\\(|new Function\\(' src/platform_control.ts src/platform_governance.ts src/challenge_games.ts public/control public/control-v2 public/games/challenge public/games/archive-raid; then\n",
              'unified executable safety')
          text = replace_once(text,
              "          if grep -R -n -E 'javascript:|data:text/html' public/control public/games/challenge public/games/archive-raid src/platform_control.ts; then\n",
              "          if grep -R -n -E 'javascript:|data:text/html' public/control public/control-v2 public/games/challenge public/games/archive-raid src/platform_control.ts src/platform_governance.ts; then\n",
              'unified URL safety')
          unified.write_text(text)
          PY

          git add .github/workflows/deploy-web-platform.yml .github/workflows/unified-platform-check.yml
          unresolved="$(git diff --name-only --diff-filter=U || true)"
          if [ -n "$unresolved" ]; then
            echo "Unresolved conflicts remain:"
            printf '%s\n' "$unresolved"
            exit 1
          fi

          rm -f .github/workflows/reconcile-main-production.yml
          git add -A
          git commit -m 'Merge latest main into validated production release'
          git push origin HEAD:feature/dyrakarmy-games-1-10-v2
