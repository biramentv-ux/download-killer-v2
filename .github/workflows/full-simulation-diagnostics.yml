name: Apply Simulation Fixes

on:
  push:
    branches:
      - test/full-virtual-simulation-v13
    paths:
      - .github/workflows/full-simulation-diagnostics.yml

permissions:
  contents: write

jobs:
  patch:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: test/full-virtual-simulation-v13
          fetch-depth: 0

      - name: Patch browser mock and downloader import path
        shell: python
        run: |
          from pathlib import Path

          simulator = Path('worker/scripts/full-virtual-simulation.mjs')
          source = simulator.read_text(encoding='utf-8')
          old = "  context.window.document = documentTarget;\n  context.window.scrollY = 0;"
          new = "  context.window.document = documentTarget;\n  context.window.IntersectionObserver = IntersectionObserver;\n  context.window.MutationObserver = MutationObserver;\n  context.window.scrollY = 0;"
          if old not in source:
              raise SystemExit('browser simulation insertion point missing')
          simulator.write_text(source.replace(old, new), encoding='utf-8')

          workflow = Path('.github/workflows/full-virtual-simulation.yml')
          source = workflow.read_text(encoding='utf-8')
          source = source.replace(
              '          pytest -q --tb=short 2>&1 | tee pytest-report.txt',
              '          PYTHONPATH=. pytest -q --tb=short 2>&1 | tee pytest-report.txt',
          )
          workflow.write_text(source, encoding='utf-8')

          Path('.github/workflows/full-simulation-diagnostics.yml').unlink()

      - name: Validate applied changes
        run: |
          grep -Fq 'context.window.IntersectionObserver = IntersectionObserver' worker/scripts/full-virtual-simulation.mjs
          grep -Fq 'PYTHONPATH=. pytest -q --tb=short' .github/workflows/full-virtual-simulation.yml
          test ! -f .github/workflows/full-simulation-diagnostics.yml

      - name: Commit fixes
        run: |
          git config user.name "download-killer-tests"
          git config user.email "actions@users.noreply.github.com"
          git add worker/scripts/full-virtual-simulation.mjs .github/workflows/full-virtual-simulation.yml .github/workflows/full-simulation-diagnostics.yml
          git commit -m "Fix deterministic browser and downloader simulations"
          git push origin HEAD:test/full-virtual-simulation-v13
