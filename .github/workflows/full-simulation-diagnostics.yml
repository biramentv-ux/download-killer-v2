name: Full Simulation Diagnostics

on:
  push:
    branches:
      - test/full-virtual-simulation-v13
    paths:
      - .github/workflows/full-simulation-diagnostics.yml
  workflow_dispatch:

permissions:
  contents: read
  pull-requests: write

jobs:
  diagnose-worker:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: test/full-virtual-simulation-v13
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm
          cache-dependency-path: worker/package-lock.json
      - name: Run deterministic simulation and capture output
        shell: bash
        run: |
          cd worker
          npm ci
          set +e
          npm run simulate:all > simulation-console.txt 2>&1
          echo $? > simulation-exit.txt
          set -e
      - name: Comment Worker diagnostics
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('node:fs');
            const consoleLog = fs.readFileSync('worker/simulation-console.txt', 'utf8').slice(-20000);
            const report = fs.existsSync('worker/full-virtual-simulation-report.json')
              ? fs.readFileSync('worker/full-virtual-simulation-report.json', 'utf8')
              : 'report missing';
            const exitCode = fs.readFileSync('worker/simulation-exit.txt', 'utf8').trim();
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: 22,
              body: `## Worker virtual simulation diagnostics\n\nExit: \`${exitCode}\`\n\n### JSON report\n\`\`\`json\n${report.slice(0, 20000)}\n\`\`\`\n\n### Console tail\n\`\`\`text\n${consoleLog}\n\`\`\``
            });

  diagnose-downloader:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: test/full-virtual-simulation-v13
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: pip
          cache-dependency-path: downloader/requirements.txt
      - name: Run pytest and capture output
        shell: bash
        run: |
          cd downloader
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          set +e
          pytest -q --tb=short > pytest-diagnostic.txt 2>&1
          echo $? > pytest-exit.txt
          set -e
      - name: Comment downloader diagnostics
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('node:fs');
            const report = fs.readFileSync('downloader/pytest-diagnostic.txt', 'utf8').slice(-30000);
            const exitCode = fs.readFileSync('downloader/pytest-exit.txt', 'utf8').trim();
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: 22,
              body: `## Downloader pytest diagnostics\n\nExit: \`${exitCode}\`\n\n\`\`\`text\n${report}\n\`\`\``
            });
