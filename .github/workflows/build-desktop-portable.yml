name: Build Desktop Portable

on:
  workflow_dispatch:
  push:
    branches:
      - main
    paths:
      - desktop_launcher/**
      - .github/workflows/build-desktop-portable.yml
  pull_request:
    paths:
      - desktop_launcher/**
      - .github/workflows/build-desktop-portable.yml

jobs:
  build-windows:
    runs-on: windows-latest
    defaults:
      run:
        shell: pwsh
        working-directory: desktop_launcher
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Validate external engine GUI
        run: |
          python -m py_compile .\external_engines\spotify_oggmp4_gui.py
          python -m unittest external_engines.test_spotify_oggmp4_gui
          python -c 'from pathlib import Path; sources = [Path("sounddrop_desktop.py").read_text(encoding="utf-8"), Path("macos_portable/sounddrop_desktop.py").read_text(encoding="utf-8")]; assert all("DEFAULT_PRIMARY_URL" in source and "https://dyrakarmy.eu" in source for source in sources); assert all("https://dyrakarmy.online" in source for source in sources)'

      - name: Build Windows EXEs
        run: |
          pyinstaller --noconfirm --clean --onefile --noconsole --name DyrakArmyDesktop sounddrop_desktop.py
          pyinstaller --noconfirm --clean --onefile --noconsole --name DyrakArmySpotifyOggMp4Engine .\external_engines\spotify_oggmp4_gui.py

      - name: Upload Windows artifact
        if: github.event_name != 'pull_request'
        uses: actions/upload-artifact@v4
        with:
          name: DyrakArmyDesktop-windows
          path: |
            desktop_launcher/dist/DyrakArmyDesktop.exe
            desktop_launcher/dist/DyrakArmySpotifyOggMp4Engine.exe

  build-macos:
    runs-on: macos-latest
    defaults:
      run:
        shell: bash
        working-directory: desktop_launcher
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pyobjc-framework-Cocoa

      - name: Validate external engine GUI
        run: |
          python -m py_compile ./external_engines/spotify_oggmp4_gui.py
          python -m unittest external_engines.test_spotify_oggmp4_gui
          python -c 'from pathlib import Path; sources = [Path("sounddrop_desktop.py").read_text(encoding="utf-8"), Path("macos_portable/sounddrop_desktop.py").read_text(encoding="utf-8")]; assert all("DEFAULT_PRIMARY_URL" in source and "https://dyrakarmy.eu" in source for source in sources); assert all("https://dyrakarmy.online" in source for source in sources)'

      - name: Build macOS app bundle
        run: |
          pyinstaller --noconfirm --clean --windowed --name DyrakArmyDesktop sounddrop_desktop.py

      - name: Archive macOS app
        run: |
          cd dist
          ditto -c -k --sequesterRsrc --keepParent "DyrakArmyDesktop.app" "DyrakArmyDesktop-macOS.zip"

      - name: Upload macOS artifact
        if: github.event_name != 'pull_request'
        uses: actions/upload-artifact@v4
        with:
          name: DyrakArmyDesktop-macos
          path: desktop_launcher/dist/DyrakArmyDesktop-macOS.zip
