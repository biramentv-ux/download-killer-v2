name: Single Telegram Bot Checks

on:
  pull_request:
    paths:
      - worker/**
      - mobile_expo/**
      - desktop_launcher/**
      - extension/**
      - .github/workflows/**
  push:
    branches:
      - main
    paths:
      - worker/**
      - mobile_expo/**
      - desktop_launcher/**
      - extension/**
      - .github/workflows/**
  workflow_dispatch:

permissions:
  contents: read
  pull-requests: write

jobs:
  validate:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: worker
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Scan retired bot references first
        id: retirement_scan
        continue-on-error: true
        run: node scripts/validate-single-telegram-bot.mjs

      - name: Publish violation report
        if: github.event_name == 'pull_request' && steps.retirement_scan.outcome != 'success'
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('node:fs');
            const report = fs.readFileSync('worker/single-bot-report.txt', 'utf8');
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              body: `## Single Telegram bot validation\n\n\`\`\`text\n${report}\n\`\`\``
            });

      - name: Fail on retired references
        if: steps.retirement_scan.outcome != 'success'
        run: |
          cat single-bot-report.txt
          exit 1

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm
          cache-dependency-path: worker/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Typecheck Worker
        run: npm run typecheck

      - name: Run Worker tests
        run: npm test

      - name: Validate native client links
        run: |
          node --check public/platform/platform.js
          node --check public/platform/site-defaults.js
          grep -q 'tg://resolve?domain=dyrakarmy_bot' public/index.html
          grep -q '"TELEGRAM_BOT_USERNAME": "dyrakarmy_bot"' wrangler.jsonc
          ! grep -R -n -E 'download_killerBOT|TELEGRAM_SECONDARY_|v10-secondary|telegram/webhook/dyrakarmy|web\.telegram\.org' src public scripts wrangler.jsonc package.json
