name: Unified TypeScript Diagnostics

on:
  push:
    branches:
      - feature/dyrakarmy-arena-v1
    paths:
      - .github/workflows/unified-typecheck-diagnostics.yml

permissions:
  contents: read
  pull-requests: write

jobs:
  diagnose-post-assertion:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: feature/dyrakarmy-arena-v1
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm
          cache-dependency-path: worker/package-lock.json
      - name: Capture post-assertion TypeScript output
        shell: bash
        run: |
          cd worker
          npm ci
          set +e
          npm run typecheck > typecheck-post-assertion.txt 2>&1
          echo $? > typecheck-post-assertion-exit.txt
          set -e
      - name: Publish post-assertion diagnostics
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('node:fs');
            const report = fs.readFileSync('worker/typecheck-post-assertion.txt', 'utf8').slice(-30000);
            const exitCode = fs.readFileSync('worker/typecheck-post-assertion-exit.txt', 'utf8').trim();
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: 25,
              body: `## Post-assertion TypeScript diagnostics\n\nCommit: \`${context.sha}\`\nExit: \`${exitCode}\`\n\n\`\`\`text\n${report}\n\`\`\``
            });
