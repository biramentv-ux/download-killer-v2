name: Apply Final Arena Return Fix

on:
  push:
    branches:
      - feature/dyrakarmy-arena-v1
    paths:
      - .github/workflows/unified-typecheck-diagnostics.yml
  pull_request:
    branches:
      - main
    paths:
      - .github/workflows/unified-typecheck-diagnostics.yml

permissions:
  contents: write

jobs:
  patch-and-commit:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: feature/dyrakarmy-arena-v1
          fetch-depth: 0

      - name: Fix leaderboard return syntax
        shell: python
        run: |
          from pathlib import Path

          path = Path('worker/src/dyrakarmy_arena.ts')
          text = path.read_text(encoding='utf-8')
          old = """  return ((result.results || []).map((row, index) => ({ ...row, position: index + 1 })))
    as Array<Record<string, unknown> & { position: number }>;"""
          new = """  return (result.results || []).map(
    (row, index) => ({ ...row, position: index + 1 }),
  ) as Array<Record<string, unknown> & { position: number }>;"""
          if old not in text:
              raise SystemExit('Expected leaderboard return block not found')
          path.write_text(text.replace(old, new), encoding='utf-8')
          Path('.github/workflows/unified-typecheck-diagnostics.yml').unlink()

      - name: Verify patch
        run: |
          grep -q "return (result.results || \[\]).map(" worker/src/dyrakarmy_arena.ts
          grep -q ") as Array<Record<string, unknown> & { position: number }>;" worker/src/dyrakarmy_arena.ts
          test ! -f .github/workflows/unified-typecheck-diagnostics.yml

      - name: Commit patch
        run: |
          git config user.name "download-killer-tests"
          git config user.email "actions@users.noreply.github.com"
          git add worker/src/dyrakarmy_arena.ts .github/workflows/unified-typecheck-diagnostics.yml
          git commit -m "Fix Arena leaderboard return syntax"
          git push origin HEAD:feature/dyrakarmy-arena-v1
