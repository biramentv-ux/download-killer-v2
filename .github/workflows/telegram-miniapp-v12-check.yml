name: Telegram Mini App v12 Checks

on:
  pull_request:
    paths:
      - worker/public/telegram/**
      - worker/public/platform/product-redesign-v20.css
      - worker/public/sw.js
      - worker/src/telegram_miniapp_health.ts
      - worker/src/platform_v2.ts
      - worker/scripts/setup-telegram-platform.mjs
      - worker/package.json
      - .github/workflows/telegram-miniapp-v12-check.yml
  push:
    branches: [main]
    paths:
      - worker/public/telegram/**
      - worker/public/platform/product-redesign-v20.css
      - worker/public/sw.js
      - worker/src/telegram_miniapp_health.ts
      - worker/src/platform_v2.ts
      - worker/scripts/setup-telegram-platform.mjs
      - worker/package.json
      - .github/workflows/telegram-miniapp-v12-check.yml
  workflow_dispatch:

permissions:
  contents: read

jobs:
  validate:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: worker
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm
          cache-dependency-path: worker/package-lock.json
      - name: Install dependencies
        run: npm ci
      - name: Typecheck Worker
        run: npm run typecheck
      - name: Run Worker tests
        run: npm test
      - name: Validate Mini App scripts
        run: |
          node --check public/telegram/telegram.js
          node --check public/telegram/telegram-runtime-v12.js
          node --check public/telegram/telegram-product-v20.js
          node --check public/sw.js
          node --check scripts/setup-telegram-platform.mjs
      - name: Validate Mini App product boundaries and health compatibility
        run: |
          node - <<'NODE'
          const fs = require('node:fs');
          const html = fs.readFileSync('public/telegram/index.html', 'utf8');
          const visible = html.replace(/<!--[\s\S]*?-->/g, '');
          const product = fs.readFileSync('public/telegram/telegram-product-v20.js', 'utf8');
          const productCss = fs.readFileSync('public/platform/product-redesign-v20.css', 'utf8');
          const runtime = fs.readFileSync('public/telegram/telegram-runtime-v12.js', 'utf8');
          const health = fs.readFileSync('src/telegram_miniapp_health.ts', 'utf8');
          const entry = fs.readFileSync('src/platform_v2.ts', 'utf8');
          const setup = fs.readFileSync('scripts/setup-telegram-platform.mjs', 'utf8');
          const sw = fs.readFileSync('public/sw.js', 'utf8');
          const pkg = JSON.parse(fs.readFileSync('package.json', 'utf8'));

          for (const marker of [
            'data-product-generation="20"',
            'product-redesign-v20.css?v=20.0.0',
            'telegram-product-v20.js?v=20.0.0',
            'data-tab="explore"',
            'data-tab="games"',
            'data-tab="profile"',
            'id="searchForm"',
            'id="profileCardName"',
          ]) if (!html.includes(marker)) throw new Error(`Missing Product System v20 Mini App marker: ${marker}`);

          for (const forbidden of [
            'data-tab="download"',
            'data-panel="download"',
            'id="downloadPanel"',
            'id="queuePanel"',
            'id="historyPanel"',
            'id="archivePanel"',
            'Обнови без кеш',
            'D1 metadata',
          ]) if (visible.includes(forbidden)) throw new Error(`Retired Mini App surface is still visible: ${forbidden}`);

          if (!product.includes("fetch('/api/search'")) throw new Error('Music Discovery search is not wired');
          if (product.includes('/miniapp/download')) throw new Error('Product Mini App still creates download jobs');
          if (!product.includes('Telegram?.WebApp')) throw new Error('Telegram WebApp integration is missing');
          if (!productCss.includes('body[data-da-surface="telegram"]')) throw new Error('Telegram Product System styling is missing');

          for (const marker of ['/api/telegram/v12/health', 'TELEGRAM_AUTH_FAILED', 'serviceWorker.getRegistrations']) {
            if (!runtime.includes(marker)) throw new Error(`Missing preserved runtime marker: ${marker}`);
          }
          for (const marker of ['TELEGRAM_MINIAPP_VERSION', '/api/telegram/v12/health', 'no-store']) {
            if (!health.includes(marker)) throw new Error(`Missing health endpoint marker: ${marker}`);
          }
          if (!entry.includes('handleTelegramMiniAppHealth')) throw new Error('Mini App health endpoint is not wired');
          if (!entry.includes('no-store, max-age=0, must-revalidate')) throw new Error('Telegram HTML is not delivered with no-store');
          if (!setup.includes('/telegram/?v=')) throw new Error('Bot menu URL is not cache-busted');
          if (!setup.includes('Refusing to bind the wrong Mini App session key')) throw new Error('Setup does not reject a wrong bot token');
          if (!sw.includes("download-killer-static-v15-games-1-10")) throw new Error('Service Worker does not preserve unified Games cache compatibility');
          if (!sw.includes("url.pathname.startsWith('/telegram/')")) throw new Error('Telegram assets are not network-first');
          if (pkg.version !== '12.2.0') throw new Error('Worker package version is not 12.2.0');
          console.log('Telegram Mini App Product System v20 and v12 health compatibility validated.');
          NODE
