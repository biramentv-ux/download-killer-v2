name: Apply Unified TypeScript Fixes

on:
  push:
    branches:
      - feature/dyrakarmy-arena-v1
    paths:
      - .github/workflows/apply-unified-typefixes.yml
  pull_request:
    branches:
      - main
    paths:
      - .github/workflows/apply-unified-typefixes.yml

permissions:
  contents: write

jobs:
  patch:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: feature/dyrakarmy-arena-v1
          fetch-depth: 0

      - name: Patch strict TypeScript errors
        shell: python
        run: |
          from pathlib import Path

          arena = Path('worker/src/dyrakarmy_arena.ts')
          text = arena.read_text(encoding='utf-8')
          text = text.replace(
              "    selected.push(pool.splice(Math.abs(state) % pool.length, 1)[0]);",
              "    const question = pool.splice(Math.abs(state) % pool.length, 1)[0];\n    if (question) selected.push(question);",
          )
          text = text.replace(
              "  return json(request, { ok: true, practice: false, recorded: true, run_id: runId, result, team, ...(await buildArenaProfile(user.id, env)) });",
              "  return json(request, { ok: true, practice: false, recorded: true, run_id: runId, result, ...(await buildArenaProfile(user.id, env)) });",
          )
          text = text.replace(
              "async function playerLeaderboard(env: ExtendedEnv, period: 'week' | 'season', limit: number) {",
              "async function playerLeaderboard(\n  env: ExtendedEnv,\n  period: 'week' | 'season',\n  limit: number,\n): Promise<Array<Record<string, unknown> & { position: number }>> {",
          )
          text = text.replace(
              "  return (result.results || []).map((row, index) => ({ position: index + 1, ...row }));\n}\n\nasync function teamLeaderboard",
              "  return (result.results || []).map((row, index) => ({ ...row, position: index + 1 }))\n    as Array<Record<string, unknown> & { position: number }>;\n}\n\nasync function teamLeaderboard",
          )
          arena.write_text(text, encoding='utf-8')

          tests = Path('worker/src/dyrakarmy_arena.test.ts')
          text = tests.read_text(encoding='utf-8')
          text = text.replace(
              "    const result = calculateArenaScore(questions, [\n      { question_id: questions[0].id, option_index: questions[0].correct, response_ms: 300 },\n      { question_id: 'unknown-question', option_index: 0, response_ms: 1 },\n      { question_id: questions[0].id, option_index: 99, response_ms: 1 },\n    ]);",
              "    const firstQuestion = questions[0];\n    expect(firstQuestion).toBeDefined();\n    if (!firstQuestion) return;\n    const result = calculateArenaScore(questions, [\n      { question_id: firstQuestion.id, option_index: firstQuestion.correct, response_ms: 300 },\n      { question_id: 'unknown-question', option_index: 0, response_ms: 1 },\n      { question_id: firstQuestion.id, option_index: 99, response_ms: 1 },\n    ]);",
          )
          tests.write_text(text, encoding='utf-8')

          control = Path('worker/src/platform_control.ts')
          text = control.read_text(encoding='utf-8')
          text = text.replace(
              "  return { ...row, metadata: parseJson(String(row.metadata_json || '{}'), {}), metadata_json: undefined };",
              "  return {\n    ...row,\n    system: Number(row.system || 0),\n    enabled: Number(row.enabled || 0),\n    metadata: parseJson(String(row.metadata_json || '{}'), {}),\n    metadata_json: undefined,\n  };",
          )
          control.write_text(text, encoding='utf-8')

          Path('.github/workflows/unified-typecheck-diagnostics.yml').unlink(missing_ok=True)
          Path('.github/workflows/apply-unified-typefixes.yml').unlink()

      - name: Verify replacements
        run: |
          grep -q "if (question) selected.push(question)" worker/src/dyrakarmy_arena.ts
          grep -q "firstQuestion.id" worker/src/dyrakarmy_arena.test.ts
          grep -q "system: Number(row.system" worker/src/platform_control.ts
          test ! -f .github/workflows/unified-typecheck-diagnostics.yml
          test ! -f .github/workflows/apply-unified-typefixes.yml

      - name: Typecheck preview
        continue-on-error: true
        working-directory: worker
        run: |
          npm ci
          npm run typecheck

      - name: Commit fixes
        run: |
          git config user.name "download-killer-tests"
          git config user.email "actions@users.noreply.github.com"
          git add worker/src/dyrakarmy_arena.ts worker/src/dyrakarmy_arena.test.ts worker/src/platform_control.ts .github/workflows/unified-typecheck-diagnostics.yml .github/workflows/apply-unified-typefixes.yml
          git commit -m "Fix unified platform strict TypeScript errors"
          git push origin HEAD:feature/dyrakarmy-arena-v1
