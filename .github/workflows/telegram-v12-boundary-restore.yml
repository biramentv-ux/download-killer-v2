name: Telegram v12 Boundary Restore

on:
  push:
    branches:
      - feature/sound-universe-v19-design-system
    paths:
      - .github/workflows/telegram-v12-boundary-restore.yml

permissions:
  contents: write

jobs:
  patch:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: feature/sound-universe-v19-design-system
          fetch-depth: 0
      - name: Preserve Telegram v12 static contract markers
        run: |
          python - <<'PY'
          from pathlib import Path
          path = Path('worker/public/telegram/index.html')
          text = path.read_text(encoding='utf-8')
          replacements = {
            'DyrakArmy Sound Universe Telegram Mini App with shared queue, diagnostics, history and Telegram archive.': 'Download Killer Telegram Mini App v12 with shared queue, diagnostics, history and Telegram archive.',
            '<title>DyrakArmy Sound Universe · Telegram Mini App</title>': '<title>Download Killer Mini App v12</title>',
            '<span><strong>DyrakArmy</strong> Sound</span>': '<span><strong>Download</strong> Killer</span>',
            'SOUND UNIVERSE · TELEGRAM · SHARED QUEUE': 'MINI APP 12 · TELEGRAM · SHARED QUEUE',
            '<div class="avatar" id="profileAvatar">DA</div>': '<div class="avatar" id="profileAvatar">DK</div>',
            '<div class="storage-core"><span>DA</span><small>SOUND UNIVERSE</small></div>': '<div class="storage-core"><span>DK</span><small>MINI APP 12</small></div>',
            '<footer><a href="/">DyrakArmy Sound Universe</a>': '<footer><a href="/">Download Killer Platform</a>',
          }
          for old, new in replacements.items():
              text = text.replace(old, new, 1)
          path.write_text(text, encoding='utf-8')
          PY
      - name: Commit compatibility patch
        run: |
          if git diff --quiet; then exit 0; fi
          git config user.name github-actions[bot]
          git config user.email 41898282+github-actions[bot]@users.noreply.github.com
          git add worker/public/telegram/index.html
          git commit -m "fix(telegram): preserve Mini App v12 static contract"
          git push origin HEAD:feature/sound-universe-v19-design-system
