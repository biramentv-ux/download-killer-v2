name: Sound Universe v19 One-shot Surface Patch

on:
  push:
    branches:
      - feature/sound-universe-v19-design-system
    paths:
      - .github/workflows/sound-universe-v19-one-shot-patch.yml

permissions:
  contents: write

jobs:
  patch:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: feature/sound-universe-v19-design-system
          fetch-depth: 0

      - name: Connect Sound Universe theme to Telegram and Control surfaces
        run: |
          python - <<'PY'
          from pathlib import Path

          def replace_once(text, old, new, path):
              if new in text:
                  return text
              if old not in text:
                  raise SystemExit(f'Expected marker not found in {path}: {old}')
              return text.replace(old, new, 1)

          control = Path('worker/public/control-v2/index.html')
          text = control.read_text(encoding='utf-8')
          text = replace_once(text,
              '  <link rel="stylesheet" href="./control-v2-i18n.css?v=18.0.0">',
              '  <link rel="stylesheet" href="./control-v2-i18n.css?v=18.0.0">\n  <link rel="stylesheet" href="/platform/sound-universe-v19.css?v=19.0.0">', control)
          text = replace_once(text, '<body>', '<body data-da-surface="control">', control)
          text = replace_once(text, '</body>', '  <script src="/platform/sound-universe-v19.js?v=19.0.0" defer></script>\n</body>', control)
          control.write_text(text, encoding='utf-8')

          telegram = Path('worker/public/telegram/index.html')
          text = telegram.read_text(encoding='utf-8')
          text = replace_once(text,
              '  <link rel="stylesheet" href="./telegram-v12.css?v=12.2.0">',
              '  <link rel="stylesheet" href="./telegram-v12.css?v=12.2.0">\n  <link rel="stylesheet" href="/platform/sound-universe-v19.css?v=19.0.0">', telegram)
          text = replace_once(text, '<body>', '<body data-da-surface="telegram">', telegram)
          text = text.replace('Download Killer Telegram Mini App v12 with shared queue, diagnostics, history and Telegram archive.', 'DyrakArmy Sound Universe Telegram Mini App with shared queue, diagnostics, history and Telegram archive.', 1)
          text = text.replace('<title>Download Killer Mini App v12</title>', '<title>DyrakArmy Sound Universe · Telegram Mini App</title>', 1)
          text = text.replace('<span><strong>Download</strong> Killer</span>', '<span><strong>DyrakArmy</strong> Sound</span>', 1)
          text = text.replace('MINI APP 12 · TELEGRAM · SHARED QUEUE', 'SOUND UNIVERSE · TELEGRAM · SHARED QUEUE', 1)
          text = text.replace('<div class="avatar" id="profileAvatar">DK</div>', '<div class="avatar" id="profileAvatar">DA</div>', 1)
          text = text.replace('<div class="storage-core"><span>DK</span><small>MINI APP 12</small></div>', '<div class="storage-core"><span>DA</span><small>SOUND UNIVERSE</small></div>', 1)
          text = text.replace('<footer><a href="/">Download Killer Platform</a>', '<footer><a href="/">DyrakArmy Sound Universe</a>', 1)
          text = replace_once(text, '</body>', '  <script src="/platform/sound-universe-v19.js?v=19.0.0" defer></script>\n</body>', telegram)
          telegram.write_text(text, encoding='utf-8')
          PY

      - name: Commit patched surfaces
        run: |
          if git diff --quiet; then exit 0; fi
          git config user.name github-actions[bot]
          git config user.email 41898282+github-actions[bot]@users.noreply.github.com
          git add worker/public/control-v2/index.html worker/public/telegram/index.html
          git commit -m "feat(ui): complete Sound Universe surface branding"
          git push origin HEAD:feature/sound-universe-v19-design-system
