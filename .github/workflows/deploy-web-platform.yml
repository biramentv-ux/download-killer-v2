name: Deploy Web Platform

on:
  pull_request:
    paths:
      - worker/**
      - wrangler.jsonc
      - .github/workflows/deploy-web-platform.yml
  push:
    branches:
      - main
    paths:
      - worker/**
      - wrangler.jsonc
      - .github/workflows/deploy-web-platform.yml
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: web-platform-${{ github.ref }}
  cancel-in-progress: true

jobs:
  validate:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: worker
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm
          cache-dependency-path: worker/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Validate sole native Telegram bot
        run: npm run validate:single-bot

      - name: Typecheck Worker
        run: npm run typecheck

      - name: Run Worker tests
        run: npm test

      - name: Validate DyrakArmy interface simulations
        run: |
          node scripts/landing-v16-simulation.mjs
          node scripts/software-suite-simulation.mjs

      - name: Validate unified public platform assets
        run: |
          node --check public/platform/platform.js
          node --check public/platform/status-backoff.js
          node --check public/platform/site-defaults.js
          node --check public/platform/landing-v13.js
          node --check public/platform/landing-v16.js
          node --check public/platform/software-suite.js
          node --check public/platform/games-v14.js
          node --check public/platform/platform-public.js
          node --check public/media-lab/media-lab.js
          node --check public/games/challenge/challenge.js
          node --check public/games/latency-strike/game.js
          node --check public/games/dyrakarmy-arena/arena.js
          node --check public/games/archive-raid/raid.js
          node --check public/control/control.js
          node --check public/control-v2/control-v2.js
          node --check public/control-v2/sw.js
          node --check public/sw.js
          node --check scripts/setup-telegram-platform.mjs
          grep -q '<title>DyrakArmy Platform</title>' public/index.html
          grep -Eq 'DyrakArmy Interface v(16|17)' public/index.html
          grep -q 'Responsive Design v13' public/index.html
          grep -q 'ONE PLATFORM.' public/index.html
          grep -q '/platform/landing-v16.css' public/index.html
          grep -q '/platform/landing-v16.js' public/index.html
          grep -q '/platform/software-suite.css' public/index.html
          grep -q '/platform/software-suite.js' public/index.html
          grep -q 'id="software"' public/index.html
          grep -q 'id="softwareReleaseGrid"' public/index.html
          grep -q '/api/software/releases' public/index.html
          grep -q 'id="mobileNavToggle"' public/index.html
          grep -q 'id="installPwaBtn"' public/index.html
          grep -q 'id="moduleGrid"' public/index.html
          grep -q 'id="profileName"' public/index.html
          grep -q 'id="previewModuleList"' public/index.html
          grep -q 'id="downloadForm"' public/index.html
          grep -q 'id="jobFeed"' public/index.html
          grep -q 'id="historyList"' public/index.html
          grep -q 'tg://resolve?domain=dyrakarmy_bot' public/index.html
          grep -q '@dyrakarmy_bot' public/index.html
          ! grep -qi 'SECONDARY BOT' public/index.html
          grep -q 'SHARED GAME ENGINE' public/games/challenge/index.html
          grep -q '/api/games/${slug}/' public/games/challenge/challenge.js
          grep -q 'DyrakArmy Arena' public/games/dyrakarmy-arena/index.html
          grep -q '/api/games/dyrakarmy-arena' public/games/dyrakarmy-arena/arena.js
          grep -q 'Archive Raid' public/games/archive-raid/index.html
          grep -q '/api/games/archive-raid' public/games/archive-raid/raid.js
          grep -q 'protected content' public/games/archive-raid/index.html
          grep -q 'DyrakArmy Control Center' public/control/index.html
          grep -q '/api/platform/control' public/control/control.js
          grep -q 'DyrakArmy Control Center v2' public/control-v2/index.html
          grep -q 'control-v2.css?v=2.1.0' public/control-v2/index.html
          grep -q '/api/platform/governance' public/control-v2/control-v2.js
          grep -q '/api/platform/public' public/platform/platform-public.js
          grep -q 'handlePlatformGovernanceApi' src/platform_v3.ts
          grep -q 'handlePlatformGovernanceTelegramWebhook' src/platform_v3.ts
          grep -q 'handleSoftwareCatalogApi' src/platform_v3.ts
          grep -q 'handleSoftwareTelegramWebhook' src/platform_v3.ts
          grep -q '"main": "src/platform_v3.ts"' wrangler.jsonc
          grep -Fq '"/games/*"' wrangler.jsonc
          grep -Fq '"/games/*"' ../wrangler.jsonc
          ! grep -R -n -F 'DB.exec(' src
          grep -q 'CREATE TABLE IF NOT EXISTS game_profiles' migrations/0012_latency_strike_v1.sql
          grep -q 'CREATE TABLE IF NOT EXISTS arena_teams' migrations/0013_dyrakarmy_arena_v1.sql
          grep -q 'CREATE TABLE IF NOT EXISTS platform_modules' migrations/0014_platform_control_center_v1.sql
          grep -q 'CREATE TABLE IF NOT EXISTS archive_raid_inventory' migrations/0015_archive_raid_v1.sql
          grep -q 'CREATE TABLE IF NOT EXISTS challenge_game_runs' migrations/0016_dyrakarmy_games_1_10.sql
          grep -q 'CREATE TABLE IF NOT EXISTS platform_users' migrations/0017_platform_governance_v2.sql
          grep -q 'CREATE TABLE IF NOT EXISTS platform_versions' migrations/0017_platform_governance_v2.sql
          grep -q 'CREATE TABLE IF NOT EXISTS platform_sessions' migrations/0017_platform_governance_v2.sql
          grep -q 'protected_content_access' migrations/0015_archive_raid_v1.sql
          grep -q 'download-killer-static-v16-dyrakarmy-dashboard' public/sw.js
          grep -q 'download-killer-static-v17-software-suite' public/sw.js
          grep -q '/platform/landing-v16.css' public/sw.js
          grep -q '/platform/landing-v16.js' public/sw.js
          grep -q '/platform/software-suite.css' public/sw.js
          grep -q '/platform/software-suite.js' public/sw.js
          grep -q '/platform/games-v14.js' public/sw.js
          grep -q '/platform/platform-public.js' public/sw.js
          grep -q '/games/challenge/challenge.js?v=1.0.0' public/sw.js
          grep -q '/games/dyrakarmy-arena/arena.js?v=1.0.0' public/sw.js
          grep -q '/games/archive-raid/raid.js?v=1.0.0' public/sw.js
          grep -q '/control/control.js?v=1.0.0' public/sw.js
          grep -q '/control-v2/' public/sw.js
          grep -Eq 'DyrakArmy Unified Platform v(16|17)' public/manifest.webmanifest
          grep -q '"url": "/#software"' public/manifest.webmanifest
          grep -q '"url": "/control-v2/"' public/manifest.webmanifest
          grep -q "command: 'software'" src/dyrakarmy_arena_commands.ts
          grep -q "command: 'games'" src/dyrakarmy_arena_commands.ts
          ! grep -R --exclude='full-virtual-simulation.mjs' -n -E 'download_killerBOT|TELEGRAM_SECONDARY_|v10-secondary|telegram/webhook/dyrakarmy|web\.telegram\.org' src public scripts wrangler.jsonc package.json

      - name: Wrangler packaging dry-run
        run: npx wrangler deploy --dry-run --config wrangler.jsonc --outdir .wrangler-web-platform

  deploy:
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    needs: validate
    runs-on: ubuntu-latest
    steps:
      - name: Verify Cloudflare Git production deployment
        shell: bash
        run: |
          set -euo pipefail
          expected='DyrakArmy Interface v17'
          deployed=0
          for attempt in $(seq 1 36); do
            echo "Production verification attempt $attempt/36"
            home="$(curl -fsSL --retry 2 --retry-all-errors --max-time 30 https://dyrakarmy.eu/ 2>/dev/null || true)"
            catalog="$(curl -fsSL --retry 2 --retry-all-errors --max-time 30 https://dyrakarmy.eu/api/software/releases 2>/dev/null || true)"
            if grep -q "$expected" <<<"$home" \
              && grep -q 'id="software"' <<<"$home" \
              && grep -q '/platform/software-suite.css' <<<"$home" \
              && grep -q '/platform/software-suite.js' <<<"$home" \
              && grep -Eq '"ok"[[:space:]]*:[[:space:]]*true' <<<"$catalog" \
              && grep -q 'DyrakArmyDesktop.exe' <<<"$catalog" \
              && grep -q 'DyrakArmySpotifyOggMp4Engine.exe' <<<"$catalog" \
              && grep -q '"games_command":"/games"' <<<"$catalog"; then
              deployed=1
              break
            fi
            sleep 20
          done
          test "$deployed" -eq 1 || { echo '::error::Cloudflare Git build did not expose the verified v17 release within 12 minutes'; exit 1; }

      - name: Production smoke test for platform, software and Games 1-10
        shell: bash
        run: |
          set -euo pipefail
          for base in https://dyrakarmy.eu https://sounddrop.biramentv.workers.dev; do
            echo "Checking $base"
            home="$(curl -fsSL --retry 5 --retry-all-errors --retry-delay 5 --max-time 45 "$base/")"
            grep -q 'DyrakArmy Platform' <<<"$home"
            grep -q 'DyrakArmy Interface v17' <<<"$home"
            grep -q 'ONE PLATFORM.' <<<"$home"
            grep -q '/platform/landing-v16.css' <<<"$home"
            grep -q '/platform/landing-v16.js' <<<"$home"
            grep -q '/platform/software-suite.css' <<<"$home"
            grep -q '/platform/software-suite.js' <<<"$home"
            grep -q 'id="softwareReleaseGrid"' <<<"$home"
            grep -q '/platform/games-v14.js' <<<"$home"
            grep -q '/platform/platform-public.js' <<<"$home"
            grep -q 'id="installPwaBtn"' <<<"$home"
            grep -q 'id="profileName"' <<<"$home"
            grep -q '@dyrakarmy_bot' <<<"$home"
            ! grep -qi 'SECONDARY BOT' <<<"$home"
            ! grep -q 'download_killerBOT' <<<"$home"
            ! grep -q 'web.telegram.org' <<<"$home"

            challenge="$(curl -fsSL --retry 5 --retry-all-errors --retry-delay 5 --max-time 45 "$base/games/queue-commander/?v=1.0.0")"
            grep -q 'SHARED GAME ENGINE' <<<"$challenge"
            grep -q 'id="questionView"' <<<"$challenge"

            arena="$(curl -fsSL --retry 5 --retry-all-errors --retry-delay 5 --max-time 45 "$base/games/dyrakarmy-arena/?v=1.0.0")"
            grep -q 'DyrakArmy Arena' <<<"$arena"
            grep -q 'id="battleStage"' <<<"$arena"

            latency="$(curl -fsSL --retry 5 --retry-all-errors --retry-delay 5 --max-time 45 "$base/games/latency-strike/?v=1.0.0")"
            grep -q 'Latency Strike' <<<"$latency"
            grep -q 'id="rewardGrid"' <<<"$latency"

            raid="$(curl -fsSL --retry 5 --retry-all-errors --retry-delay 5 --max-time 45 "$base/games/archive-raid/?v=1.0.0")"
            grep -q 'Archive Raid' <<<"$raid"
            grep -q 'id="sectorTrack"' <<<"$raid"

            control_v2="$(curl -fsSL --retry 5 --retry-all-errors --retry-delay 5 --max-time 45 "$base/control-v2/?v=2.1.0")"
            grep -q 'DyrakArmy Control Center v2' <<<"$control_v2"
            grep -q 'id="roleForm"' <<<"$control_v2"
          done

          catalog="$(curl -fsSL --retry 5 --retry-all-errors --retry-delay 5 --max-time 45 https://dyrakarmy.eu/api/software/releases)"
          grep -Eq '"ok"[[:space:]]*:[[:space:]]*true' <<<"$catalog"
          for file in DyrakArmyDesktop.exe DyrakArmyDesktop-macOS.zip DyrakArmySpotifyOggMp4Engine.exe DyrakArmy-Extension-Chrome.zip DyrakArmy-Extension-Firefox.zip SoundDrop-Expo-Web.zip SoundDrop-Expo-Native-Update.zip; do
            grep -q "$file" <<<"$catalog"
          done
          grep -q '"bot":"@dyrakarmy_bot"' <<<"$catalog"
          grep -q '"command":"/software"' <<<"$catalog"
          grep -q '"games_command":"/games"' <<<"$catalog"

          registry="$(curl -fsSL --retry 5 --retry-all-errors --retry-delay 5 --max-time 45 https://dyrakarmy.eu/api/platform/public)"
          grep -Eq '"ok"[[:space:]]*:[[:space:]]*true' <<<"$registry"
          for slug in queue-commander beat-hunter dyrakarmy-arena format-forge server-defender metadata-detective link-runner archive-raid latency-strike bot-vs-human; do
            grep -q "\"$slug\"" <<<"$registry"
          done

          governance="$(curl -fsSL --retry 5 --retry-all-errors --retry-delay 5 --max-time 45 https://dyrakarmy.eu/api/platform/governance/health)"
          grep -Eq '"ok"[[:space:]]*:[[:space:]]*true' <<<"$governance"
          grep -q '"version":"2.0.0"' <<<"$governance"

          health="$(curl -fsSL --retry 5 --retry-all-errors --retry-delay 5 --max-time 45 https://dyrakarmy.eu/api/telegram/v12/health)"
          grep -Eq '"ok"[[:space:]]*:[[:space:]]*true' <<<"$health"
          grep -q '"username":"dyrakarmy_bot"' <<<"$health"
