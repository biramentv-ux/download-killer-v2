name: Deploy Web Platform

on:
  pull_request:
    paths:
      - worker/**
      - .github/workflows/deploy-web-platform.yml
  push:
    branches:
      - main
    paths:
      - worker/**
      - .github/workflows/deploy-web-platform.yml
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: web-platform-${{ github.ref }}
  cancel-in-progress: true

jobs:
  validate:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: worker
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm
          cache-dependency-path: worker/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Typecheck Worker
        run: npm run typecheck

      - name: Run Worker tests
        run: npm test

      - name: Validate platform JavaScript and service worker
        run: |
          node --check public/platform/platform.js
          node --check public/media-lab/media-lab.js
          node --check public/sw.js

      - name: Validate multilingual platform, Media Lab and mirrors
        run: |
          node - <<'NODE'
          const fs = require('node:fs');
          const html = fs.readFileSync('public/index.html', 'utf8');
          const legacyPlatform = fs.readFileSync('public/platform/index.html', 'utf8');
          const css = fs.readFileSync('public/platform/platform.css', 'utf8');
          const js = fs.readFileSync('public/platform/platform.js', 'utf8');
          const labCss = fs.readFileSync('public/media-lab/media-lab.css', 'utf8');
          const labJs = fs.readFileSync('public/media-lab/media-lab.js', 'utf8');
          const labApi = fs.readFileSync('src/media_lab.ts', 'utf8');
          const entrypoint = fs.readFileSync('src/platform_v2.ts', 'utf8');
          const manifest = JSON.parse(fs.readFileSync('public/manifest.webmanifest', 'utf8'));
          const sw = fs.readFileSync('public/sw.js', 'utf8');
          const wrangler = fs.readFileSync('wrangler.jsonc', 'utf8');

          const requiredHtml = [
            '<title>Download Killer Platform</title>',
            'id="tutorial"',
            'id="languageSelect"',
            '<option value="ru">RU</option>',
            '<option value="de">DE</option>',
            'id="downloadForm"',
            'id="jobFeed"',
            'id="engineGrid"',
            'id="signalCanvas"',
            'id="globalHealth"',
            'id="historyList"',
            'id="copyBotHandleBtn"',
            'https://web.telegram.org/k/#@download_killerBOT',
            'https://dyrakarmy.online/',
            'https://dyrakarmy.eu/',
            '/telegram/',
            '/platform/platform.css',
            '/platform/platform.js',
          ];
          for (const marker of requiredHtml) {
            if (!html.includes(marker)) throw new Error(`Missing homepage marker: ${marker}`);
          }

          for (const jsMarker of [
            'bg:', 'en:', 'ru:', 'de:',
            'tg://resolve?domain=',
            'web.telegram.org/k/#@',
            'openTelegram(mode)',
            'updateMirrorLink()',
          ]) {
            if (!js.includes(jsMarker)) throw new Error(`Missing i18n/fallback marker: ${jsMarker}`);
          }

          for (const labMarker of [
            '/media-lab/inspect',
            '/media-lab/rank',
            '/preview',
            '/search',
            'Cross-source Match Finder',
            'SaveHere (Apache-2.0)',
            'FluentDL (MIT)',
          ]) {
            if (!labJs.includes(labMarker)) throw new Error(`Missing Media Lab frontend marker: ${labMarker}`);
          }
          for (const apiMarker of [
            "'/api/media-lab/inspect'",
            "'/api/media-lab/rank'",
            'validateUrlPolicy',
            'Range:',
            'rankMediaCandidates',
            'parseContentDispositionFilename',
          ]) {
            if (!labApi.includes(apiMarker)) throw new Error(`Missing Media Lab API marker: ${apiMarker}`);
          }
          if (!entrypoint.includes('handleMediaLabApi') || !entrypoint.includes('injectMediaLabAssets')) {
            throw new Error('Media Lab is not wired into the Worker entrypoint');
          }
          if (!labCss.includes('@media (prefers-reduced-motion: reduce)')) {
            throw new Error('Media Lab reduced-motion rule is missing');
          }

          for (const mirrorMarker of [
            '"pattern": "dyrakarmy.eu"',
            '"pattern": "www.dyrakarmy.eu"',
            '"zone_name": "dyrakarmy.eu"',
            'https://dyrakarmy.eu',
            'https://www.dyrakarmy.eu',
          ]) {
            if (!wrangler.includes(mirrorMarker)) throw new Error(`Missing EU mirror config: ${mirrorMarker}`);
          }

          if (!legacyPlatform.includes("window.location.replace('/')")) {
            throw new Error('Legacy /platform route does not redirect to the main homepage');
          }
          if (!css.includes('@media (prefers-reduced-motion: reduce)')) {
            throw new Error('Reduced-motion accessibility rule is missing');
          }
          for (const endpoint of ['/download', '/health', '/runtime-config', '/history']) {
            if (!js.includes(endpoint)) throw new Error(`Missing API integration: ${endpoint}`);
          }
          if (manifest.name !== 'Download Killer Platform v12') {
            throw new Error('PWA manifest version is not v12');
          }
          if (!sw.includes('download-killer-static-v13')) {
            throw new Error('Service-worker cache version is not v13');
          }
          for (const asset of ['/media-lab/media-lab.css', '/media-lab/media-lab.js']) {
            if (!sw.includes(asset)) throw new Error(`Media Lab PWA asset is missing: ${asset}`);
          }
          if (html.includes('<title>DyrakArmy v7</title>')) {
            throw new Error('Legacy homepage title is still present');
          }
          console.log('Multilingual platform, Media Lab and mirror configuration validated.');
          NODE

  deploy:
    if: github.event_name != 'pull_request'
    needs: validate
    runs-on: ubuntu-latest
    environment: production
    env:
      CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
      CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Detect Cloudflare credentials
        id: credentials
        shell: bash
        run: |
          if [ -n "$CLOUDFLARE_API_TOKEN" ] && [ -n "$CLOUDFLARE_ACCOUNT_ID" ]; then
            echo "available=true" >> "$GITHUB_OUTPUT"
          else
            echo "available=false" >> "$GITHUB_OUTPUT"
            echo "::warning::Cloudflare secrets are missing. Validation passed, but deployment was skipped."
          fi

      - name: Deploy Worker and static platform
        id: cloudflare
        if: steps.credentials.outputs.available == 'true'
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          workingDirectory: worker
          command: deploy --config wrangler.jsonc

      - name: Production smoke test
        if: steps.cloudflare.outcome == 'success'
        shell: bash
        run: |
          set -euo pipefail
          urls=(
            "https://dyrakarmy.online/"
            "https://www.dyrakarmy.online/"
            "https://dyrakarmy.eu/"
            "https://www.dyrakarmy.eu/"
            "https://sounddrop.biramentv.workers.dev/"
          )
          failed=0
          for url in "${urls[@]}"; do
            echo "Checking $url"
            ok=0
            for attempt in 1 2 3 4 5 6; do
              if body="$(curl -fsSL --retry 2 --retry-delay 3 --max-time 25 "$url" 2>/dev/null)"; then
                if grep -q "Download Killer Platform" <<<"$body" && grep -q "download_killerBOT" <<<"$body" && grep -q "/media-lab/media-lab.js" <<<"$body"; then
                  echo "Live: $url"
                  ok=1
                  break
                fi
              fi
              sleep 10
            done
            if [ "$ok" -ne 1 ]; then
              echo "::error::Mirror endpoint is not serving Download Killer Media Lab: $url"
              failed=1
            fi
          done
          exit "$failed"
