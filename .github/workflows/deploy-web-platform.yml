name: Deploy Web Platform

on:
  pull_request:
    paths:
      - worker/**
      - .github/workflows/deploy-web-platform.yml
  push:
    branches:
      - main
    paths:
      - worker/**
      - .github/workflows/deploy-web-platform.yml
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: web-platform-${{ github.ref }}
  cancel-in-progress: true

jobs:
  validate:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: worker
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm
          cache-dependency-path: worker/package-lock.json
      - name: Install dependencies
        run: npm ci
      - name: Validate sole native Telegram bot
        run: npm run validate:single-bot
      - name: Typecheck Worker
        run: npm run typecheck
      - name: Run Worker tests
        run: npm test
      - name: Validate unified public platform assets
        run: |
          node --check public/platform/platform.js
          node --check public/platform/status-backoff.js
          node --check public/platform/site-defaults.js
          node --check public/platform/landing-v13.js
          node --check public/platform/games-v14.js
          node --check public/platform/platform-public.js
          node --check public/media-lab/media-lab.js
          node --check public/games/latency-strike/game.js
          node --check public/games/dyrakarmy-arena/arena.js
          node --check public/games/archive-raid/raid.js
          node --check public/games/shared/game-pack.js
          node --check public/control/control.js
          node --check public/sw.js
          node --check scripts/setup-telegram-platform.mjs
          grep -q '<title>Download Killer Platform</title>' public/index.html
          grep -q 'Responsive Design v13' public/index.html
          grep -q 'id="downloadForm"' public/index.html
          grep -q 'DyrakArmy Arena' public/games/dyrakarmy-arena/index.html
          grep -q 'Archive Raid' public/games/archive-raid/index.html
          grep -q 'data-game-id="queue-commander"' public/games/queue-commander/index.html
          grep -q 'data-game-id="bot-vs-human"' public/games/bot-vs-human/index.html
          grep -q 'DyrakArmy Control Center' public/control/index.html
          grep -q '/api/platform/control' public/control/control.js
          grep -q '/api/platform/public' public/platform/platform-public.js
          grep -q 'CREATE TABLE IF NOT EXISTS game_profiles' migrations/0012_latency_strike_v1.sql
          grep -q 'CREATE TABLE IF NOT EXISTS arena_teams' migrations/0013_dyrakarmy_arena_v1.sql
          grep -q 'CREATE TABLE IF NOT EXISTS platform_modules' migrations/0014_platform_control_center_v1.sql
          grep -q 'CREATE TABLE IF NOT EXISTS archive_raid_runs' migrations/0015_archive_raid_v1.sql
          grep -q 'CREATE TABLE IF NOT EXISTS game_pack_runs' migrations/0016_dyrakarmy_game_pack_v1.sql
          grep -q 'download-killer-static-v15-games-10' public/sw.js
          grep -q '/games/shared/game-pack.js?v=1.0.0' public/sw.js
          grep -q '/games/archive-raid/raid.js?v=1.0.0' public/sw.js
          grep -q '/control/control.js?v=1.0.0' public/sw.js
          for command in arena game raid queuegame beathunter formatforge serverdefender metadata linkrunner botvshuman control id; do
            grep -q "command: '$command'" scripts/setup-telegram-platform.mjs
          done
          ! grep -R --exclude='full-virtual-simulation.mjs' -n -E 'download_killerBOT|TELEGRAM_SECONDARY_|v10-secondary|telegram/webhook/dyrakarmy|web\.telegram\.org' src public scripts wrangler.jsonc package.json

  deploy:
    if: github.event_name != 'pull_request'
    needs: validate
    runs-on: ubuntu-latest
    environment: production
    env:
      CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
      CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Require Cloudflare credentials
        shell: bash
        run: |
          set -euo pipefail
          test -n "$CLOUDFLARE_API_TOKEN" || { echo '::error::CLOUDFLARE_API_TOKEN is missing'; exit 1; }
          test -n "$CLOUDFLARE_ACCOUNT_ID" || { echo '::error::CLOUDFLARE_ACCOUNT_ID is missing'; exit 1; }
      - name: Apply remote D1 migrations
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          workingDirectory: worker
          command: d1 migrations apply sounddrop-db --remote --config wrangler.jsonc
      - name: Deploy Worker and static platform
        id: cloudflare
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          workingDirectory: worker
          command: deploy --config wrangler.jsonc
      - name: Production smoke test for all ten games
        shell: bash
        run: |
          set -euo pipefail
          games=(queue-commander beat-hunter dyrakarmy-arena format-forge server-defender metadata-detective link-runner archive-raid latency-strike bot-vs-human)
          for base in https://dyrakarmy.eu https://sounddrop.biramentv.workers.dev; do
            echo "Checking $base"
            home="$(curl -fsSL --retry 5 --retry-all-errors --retry-delay 5 --max-time 45 "$base/")"
            grep -q 'Download Killer Platform' <<<"$home"
            grep -q '/platform/games-v14.js' <<<"$home"
            grep -q '/platform/platform-public.js' <<<"$home"
            grep -q '@dyrakarmy_bot' <<<"$home"
            ! grep -q 'download_killerBOT' <<<"$home"
            ! grep -q 'web.telegram.org' <<<"$home"

            for game in "${games[@]}"; do
              page="$(curl -fsSL --retry 5 --retry-all-errors --retry-delay 5 --max-time 45 "$base/games/$game/?v=1.0.0")"
              test -n "$page"
              case "$game" in
                dyrakarmy-arena) grep -q 'DyrakArmy Arena' <<<"$page" ;;
                latency-strike) grep -q 'Latency Strike' <<<"$page" ;;
                archive-raid) grep -q 'Archive Raid' <<<"$page" ;;
                *) grep -q "data-game-id=\"$game\"" <<<"$page" ;;
              esac
            done

            control="$(curl -fsSL --retry 5 --retry-all-errors --retry-delay 5 --max-time 45 "$base/control/?v=1.0.0")"
            grep -q 'DyrakArmy Control Center' <<<"$control"
            grep -q 'id="moduleList"' <<<"$control"
          done

          registry="$(curl -fsSL --retry 5 --retry-all-errors --retry-delay 5 --max-time 45 https://dyrakarmy.eu/api/platform/public)"
          grep -Eq '"ok"[[:space:]]*:[[:space:]]*true' <<<"$registry"
          for game in "${games[@]}"; do grep -q "\"$game\"" <<<"$registry"; done

          catalog="$(curl -fsSL --retry 5 --retry-all-errors --retry-delay 5 --max-time 45 https://dyrakarmy.eu/api/games/game-pack/catalog)"
          grep -q '"total_games":10' <<<"$catalog"
          for game in queue-commander beat-hunter format-forge server-defender metadata-detective link-runner bot-vs-human; do
            grep -q "\"$game\"" <<<"$catalog"
            config="$(curl -fsSL --retry 5 --retry-all-errors --retry-delay 5 --max-time 45 "https://dyrakarmy.eu/api/games/$game/config")"
            grep -q '"shared_profile":true' <<<"$config"
          done

          raid_config="$(curl -fsSL --retry 5 --retry-all-errors --retry-delay 5 --max-time 45 https://dyrakarmy.eu/api/games/archive-raid/config)"
          grep -q '"game":"archive-raid"' <<<"$raid_config"
          grep -q '"protected_content_access":false' <<<"$raid_config"
          arena_config="$(curl -fsSL --retry 5 --retry-all-errors --retry-delay 5 --max-time 45 https://dyrakarmy.eu/api/games/dyrakarmy-arena/config)"
          grep -q '"daily_attempts":3' <<<"$arena_config"
          latency_config="$(curl -fsSL --retry 5 --retry-all-errors --retry-delay 5 --max-time 45 https://dyrakarmy.eu/api/games/latency-strike/config)"
          grep -q '"game":"latency-strike"' <<<"$latency_config"
          health="$(curl -fsSL --retry 5 --retry-all-errors --retry-delay 5 --max-time 45 https://dyrakarmy.eu/api/telegram/v12/health)"
          grep -Eq '"ok"[[:space:]]*:[[:space:]]*true' <<<"$health"
          grep -q '"username":"dyrakarmy_bot"' <<<"$health"
