name: Fix Final Arena Type Assertion

on:
  pull_request:
    branches:
      - main
    paths:
      - .github/workflows/fix-arena-type-assertion.yml

permissions:
  contents: write

jobs:
  patch:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: feature/dyrakarmy-arena-v1
          fetch-depth: 0

      - name: Fix assertion syntax
        shell: python
        run: |
          from pathlib import Path
          path = Path('worker/src/dyrakarmy_arena.ts')
          text = path.read_text(encoding='utf-8')
          old = "  return (result.results || []).map((row, index) => ({ ...row, position: index + 1 }))\n    as Array<Record<string, unknown> & { position: number }>;"
          new = "  return ((result.results || []).map((row, index) => ({ ...row, position: index + 1 })))\n    as Array<Record<string, unknown> & { position: number }>;"
          if old not in text:
              raise SystemExit('Expected assertion block not found')
          path.write_text(text.replace(old, new), encoding='utf-8')
          Path('.github/workflows/unified-typecheck-diagnostics.yml').unlink(missing_ok=True)
          Path('.github/workflows/fix-arena-type-assertion.yml').unlink()

      - name: Typecheck preview
        continue-on-error: true
        working-directory: worker
        run: |
          npm ci
          npm run typecheck

      - name: Commit final type fix
        run: |
          git config user.name "download-killer-tests"
          git config user.email "actions@users.noreply.github.com"
          git add worker/src/dyrakarmy_arena.ts .github/workflows/unified-typecheck-diagnostics.yml .github/workflows/fix-arena-type-assertion.yml
          git commit -m "Fix final Arena leaderboard type assertion"
          git push origin HEAD:feature/dyrakarmy-arena-v1
