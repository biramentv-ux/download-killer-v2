name: Record Production Deploy

on:
  workflow_run:
    workflows:
      - Deploy Web Platform
    types:
      - completed

permissions:
  actions: read
  contents: write

jobs:
  record:
    if: >-
      github.event.workflow_run.conclusion == 'success' &&
      github.event.workflow_run.event == 'push' &&
      github.event.workflow_run.head_branch == 'main'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout deployed main commit
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.workflow_run.head_sha }}
          fetch-depth: 0

      - name: Write production receipt
        shell: bash
        env:
          DEPLOYED_SHA: ${{ github.event.workflow_run.head_sha }}
          DEPLOY_RUN_ID: ${{ github.event.workflow_run.id }}
          DEPLOY_RUN_NUMBER: ${{ github.event.workflow_run.run_number }}
          DEPLOY_URL: ${{ github.event.workflow_run.html_url }}
        run: |
          set -euo pipefail
          mkdir -p .deployments
          deployed_at="$(date -u +'%Y-%m-%dT%H:%M:%SZ')"
          cat > .deployments/latest.json <<EOF
          {
            "status": "confirmed",
            "environment": "production",
            "deployment_mode": "github-actions-auto-deploy",
            "deployed_commit": "${DEPLOYED_SHA}",
            "confirmed_source_commit": "1174ac2ddda1acdce386603d82de1f71e4f07f48",
            "source_pr": 18,
            "workflow": "Deploy Web Platform",
            "workflow_run_id": "${DEPLOY_RUN_ID}",
            "workflow_run_number": "${DEPLOY_RUN_NUMBER}",
            "workflow_run_url": "${DEPLOY_URL}",
            "deployed_at_utc": "${deployed_at}",
            "canonical_domain": "https://dyrakarmy.eu",
            "worker_fallback": "https://sounddrop.biramentv.workers.dev"
          }
          EOF

      - name: Commit receipt without triggering another deploy
        shell: bash
        run: |
          set -euo pipefail
          git config user.name "download-killer-deploy-bot"
          git config user.email "actions@users.noreply.github.com"
          git add .deployments/latest.json
          if git diff --cached --quiet; then
            echo "Deployment receipt is already current."
            exit 0
          fi
          git commit -m "Record confirmed production deployment"
          git push origin HEAD:main
