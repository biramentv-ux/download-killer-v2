name: Retire Old Bot Codemod

on:
  push:
    branches:
      - fix/final-retired-bot-references
    paths:
      - .github/workflows/retire-old-bot-codemod.yml
  workflow_dispatch:

permissions:
  contents: write

jobs:
  rewrite:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout feature branch
        uses: actions/checkout@v4
        with:
          ref: fix/final-retired-bot-references
          fetch-depth: 0

      - name: Replace retired bot references
        shell: python
        run: |
          from pathlib import Path

          files = [
              Path('worker/src/telegram_master_menu.ts'),
              Path('worker/src/telegram_platform.test.ts'),
              Path('worker/src/telegram_platform.ts'),
              Path('worker/public/telegram/index.html'),
              Path('worker/public/telegram/telegram.js'),
          ]
          for file in files:
              text = file.read_text(encoding='utf-8')
              text = text.replace('download_killerBOT', 'dyrakarmy_bot')
              file.write_text(text, encoding='utf-8')

          platform = Path('worker/src/telegram_platform.ts')
          text = platform.read_text(encoding='utf-8')
          text = text.replace(
              'botUrl: `https://t.me/${cleanUsername}?start=${payload}`,',
              'botUrl: `tg://resolve?domain=${cleanUsername}&start=${payload}`,',
          )
          text = text.replace(
              'miniAppUrl: `https://t.me/${cleanUsername}?startapp=${payload}`,',
              'miniAppUrl: `tg://resolve?domain=${cleanUsername}&startapp=${payload}`,',
          )
          platform.write_text(text, encoding='utf-8')

          test = Path('worker/src/telegram_platform.test.ts')
          text = test.read_text(encoding='utf-8')
          text = text.replace(
              "botUrl: 'https://t.me/dyrakarmy_bot?start=job_abc-123',",
              "botUrl: 'tg://resolve?domain=dyrakarmy_bot&start=job_abc-123',",
          )
          text = text.replace(
              "miniAppUrl: 'https://t.me/dyrakarmy_bot?startapp=job_abc-123',",
              "miniAppUrl: 'tg://resolve?domain=dyrakarmy_bot&startapp=job_abc-123',",
          )
          test.write_text(text, encoding='utf-8')

          Path('.github/workflows/retire-old-bot-codemod.yml').unlink()

      - name: Verify retired username is gone
        run: |
          ! grep -R -n 'download_killerBOT' worker/src worker/public/telegram
          grep -q 'tg://resolve?domain=${cleanUsername}' worker/src/telegram_platform.ts
          grep -q '@dyrakarmy_bot' worker/public/telegram/index.html

      - name: Commit codemod
        run: |
          git config user.name "download-killer-maintenance"
          git config user.email "actions@users.noreply.github.com"
          git add worker/src/telegram_master_menu.ts worker/src/telegram_platform.test.ts worker/src/telegram_platform.ts worker/public/telegram/index.html worker/public/telegram/telegram.js .github/workflows/retire-old-bot-codemod.yml
          git commit -m "Remove final retired bot references"
          git push origin HEAD:fix/final-retired-bot-references
