name: Hugging Face Typecheck Diagnostic

on:
  pull_request:
    paths:
      - hf_space/**
      - .github/workflows/hf-typecheck-diagnostic.yml
      - .github/workflows/hugging-face-space.yml
  workflow_dispatch:

permissions:
  contents: read

jobs:
  diagnose:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          show-progress: false

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: worker/package-lock.json

      - working-directory: worker
        run: npm ci --silent

      - name: Apply Hugging Face overlays
        run: |
          cp hf_space/platform_hf.ts worker/src/platform_hf.ts
          cp hf_space/platform_hf.test.ts worker/src/platform_hf.test.ts

      - name: Capture TypeScript diagnostics
        working-directory: worker
        shell: bash
        run: |
          set +e
          npm run typecheck --silent > ../hf-typecheck.log 2>&1
          status=$?
          echo "$status" > ../hf-typecheck.status
          tail -n 80 ../hf-typecheck.log || true
          exit 0

      - name: Upload TypeScript diagnostics
        uses: actions/upload-artifact@v4
        with:
          name: hf-typecheck-diagnostic
          path: |
            hf-typecheck.log
            hf-typecheck.status
          if-no-files-found: error

      - name: Enforce TypeScript result
        run: test "$(cat hf-typecheck.status)" -eq 0
