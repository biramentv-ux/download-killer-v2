name: Unified Platform Checks

on:
  pull_request:
    paths:
      - worker/**
      - .github/workflows/unified-platform-check.yml
  push:
    branches: [main]
    paths:
      - worker/**
      - .github/workflows/unified-platform-check.yml
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: unified-platform-${{ github.ref }}
  cancel-in-progress: true

jobs:
  validate:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: worker
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm
          cache-dependency-path: worker/package-lock.json
      - name: Install dependencies
        run: npm ci
      - name: Typecheck unified Worker
        run: npm run typecheck
      - name: Run all Worker and game tests
        run: npm test
      - name: Run DyrakArmy interface simulations
        run: |
          node scripts/product-redesign-v20-simulation.mjs
          node scripts/landing-v16-simulation.mjs
          node scripts/software-suite-simulation.mjs
          node scripts/games-1-10-simulation.mjs
      - name: Validate browser assets
        run: |
          node --check public/platform/product-redesign-v20.js
          node --check public/telegram/telegram-product-v20.js
          node --check public/platform/games-v14.js
          node --check public/platform/platform-public.js
          node --check public/games/challenge/challenge.js
          node --check public/games/dyrakarmy-arena/arena.js
          node --check public/games/archive-raid/raid.js
          node --check public/control/control.js
          node --check public/control-v2/control-v2.js
          node --check public/control-v2/sw.js
          node --check public/games/latency-strike/game.js
          node --check public/sw.js
          node --check scripts/setup-telegram-platform.mjs
      - name: Validate unified backend contracts
        run: |
          grep -q "handlePlatformControlApi" src/platform_v2.ts
          grep -q "handlePlatformControlTelegramWebhook" src/platform_v2.ts
          grep -q "handleChallengeGamesApi" src/platform_v2.ts
          grep -q "handleChallengeGamesTelegramWebhook" src/platform_v2.ts
          grep -q "CHALLENGE_SLUGS.map" src/platform_v2.ts
          grep -q "handleDyrakArmyArenaApi" src/platform_v2.ts
          grep -q "handleArchiveRaidApi" src/platform_v2.ts
          grep -q "handleArchiveRaidTelegramWebhook" src/platform_v2.ts
          grep -q "isPlatformModuleEnabled" src/platform_v2.ts
          grep -q "handlePlatformGovernanceApi" src/platform_v3.ts
          grep -q "handlePlatformGovernanceTelegramWebhook" src/platform_v3.ts
          grep -q "handleSoftwareCatalogApi" src/platform_v3.ts
          grep -q "handleSoftwareTelegramWebhook" src/platform_v3.ts
          grep -q "return platformV2.fetch" src/platform_v3.ts
          grep -q '"main": "src/platform_v3.ts"' wrangler.jsonc
          grep -q "TELEGRAM_ADMIN_IDS" src/types.ts
          grep -q "TELEGRAM_ADMIN_IDS" src/platform_control.ts
          grep -q "control-center" src/platform_control.ts
          grep -q "dyrakarmy-arena" src/platform_control.ts
          grep -q "module.toggle" src/platform_control.ts
          grep -q "content.upsert" src/platform_control.ts
          grep -q "setting.set" src/platform_control.ts
          grep -q "platform_audit" src/platform_control.ts
          grep -q "type PlatformRole = 'owner' | 'admin' | 'editor' | 'moderator' | 'user'" src/platform_governance.ts
          grep -q "identity.link.start" src/platform_governance.ts
          grep -q "version.rollback" src/platform_governance.ts
          grep -q "text/event-stream" src/platform_governance.ts
          grep -q "await sha256(token)" src/platform_governance.ts
      - name: Validate Product System v20 public contracts
        run: |
          node - <<'NODE'
          const fs = require('node:fs');
          const strip = value => value.replace(/<!--[\s\S]*?-->/g, '');
          const web = fs.readFileSync('public/index.html','utf8');
          const telegram = fs.readFileSync('public/telegram/index.html','utf8');
          const control = fs.readFileSync('public/control-v2/index.html','utf8');
          const sw = fs.readFileSync('public/sw.js','utf8');
          const manifest = JSON.parse(fs.readFileSync('public/manifest.webmanifest','utf8'));
          for (const html of [web, telegram, control]) {
            if (!html.includes('data-product-generation="20"')) throw new Error('A core surface is not on Product System v20');
            if (!html.includes('/platform/product-redesign-v20.css?v=20.0.0')) throw new Error('Shared Product System stylesheet is missing');
          }
          for (const id of ['overview','experiences','studio','games','apps','profile','community']) {
            if (!web.includes(`id="${id}"`)) throw new Error(`Missing product section ${id}`);
          }
          const visibleWeb = strip(web);
          const visibleTelegram = strip(telegram);
          for (const forbidden of ['softwareReleaseGrid','softwarePreferredDownload','id="downloadForm"','MEDIA DOWNLOAD CONSOLE','MEDIA DOWNLOAD CENTER']) {
            if (visibleWeb.includes(forbidden)) throw new Error(`Retired public surface visible: ${forbidden}`);
          }
          for (const forbidden of ['data-tab="download"','id="downloadPanel"','id="queuePanel"','id="historyPanel"','id="archivePanel"']) {
            if (visibleTelegram.includes(forbidden)) throw new Error(`Retired Telegram surface visible: ${forbidden}`);
          }
          if (!control.includes('YOUR DYRAKARMY SPACE')) throw new Error('Control Center product hierarchy is missing');
          if (!sw.includes('dyrakarmy-product-system-v20')) throw new Error('Product System PWA marker missing');
          for (const asset of ['/platform/product-redesign-v20.css?v=20.0.0','/platform/product-redesign-v20.js?v=20.0.0','/telegram/telegram-product-v20.js?v=20.0.0']) {
            if (!sw.includes(asset)) throw new Error(`PWA asset missing: ${asset}`);
          }
          if (!/^DyrakArmy Unified Platform v(?:16|17)$/.test(manifest.name)) throw new Error('Manifest name mismatch');
          for (const url of ['/#software','/control-v2/','/#games','/telegram/']) {
            if (!manifest.shortcuts.some(item => item.url === url)) throw new Error(`Manifest shortcut missing: ${url}`);
          }
          NODE
          grep -q "DyrakArmy Control Center" public/control/index.html
          grep -q "DyrakArmy Control Center v2" public/control-v2/index.html
          grep -q "/api/platform/governance" public/control-v2/control-v2.js
          grep -q "SHARED GAME ENGINE" public/games/challenge/index.html
          grep -q '/api/games/${slug}/' public/games/challenge/challenge.js
          grep -q "DyrakArmy Arena" public/games/dyrakarmy-arena/index.html
          grep -q "/api/games/dyrakarmy-arena" public/games/dyrakarmy-arena/arena.js
          grep -q "Archive Raid" public/games/archive-raid/index.html
          grep -q "/api/games/archive-raid" public/games/archive-raid/raid.js
          grep -q "Army Exclusive" src/archive_raid.ts
          grep -q "protected_content_access: false" src/archive_raid.ts
          grep -q "/api/platform/control" public/control/control.js
          grep -q "/api/platform/public" public/platform/platform-public.js
          grep -q "/games/challenge/challenge.js?v=1.0.0" public/sw.js
          grep -q "/games/dyrakarmy-arena/arena.js?v=1.0.0" public/sw.js
          grep -q "/games/archive-raid/raid.js?v=1.0.0" public/sw.js
          grep -q "/control/control.js?v=1.0.0" public/sw.js
          grep -q "/control-v2/" public/sw.js
          grep -q "dyrakarmy-control-v2-2.1.0-cyber" public/control-v2/sw.js
          grep -q "CREATE TABLE IF NOT EXISTS arena_teams" migrations/0013_dyrakarmy_arena_v1.sql
          grep -q "CREATE TABLE IF NOT EXISTS platform_modules" migrations/0014_platform_control_center_v1.sql
          grep -q "CREATE TABLE IF NOT EXISTS platform_audit" migrations/0014_platform_control_center_v1.sql
          grep -q "CREATE TABLE IF NOT EXISTS archive_raid_inventory" migrations/0015_archive_raid_v1.sql
          grep -q "CREATE TABLE IF NOT EXISTS challenge_game_runs" migrations/0016_dyrakarmy_games_1_10.sql
          grep -q "CREATE TABLE IF NOT EXISTS platform_users" migrations/0017_platform_governance_v2.sql
          grep -q "CREATE TABLE IF NOT EXISTS platform_versions" migrations/0017_platform_governance_v2.sql
          grep -q "CREATE TABLE IF NOT EXISTS platform_sessions" migrations/0017_platform_governance_v2.sql
          grep -q "command: 'queuegame'" scripts/setup-telegram-platform.mjs
          grep -q "command: 'arena'" scripts/setup-telegram-platform.mjs
          grep -q "command: 'raid'" scripts/setup-telegram-platform.mjs
          grep -q "command: 'botvhuman'" scripts/setup-telegram-platform.mjs
          grep -q "command: 'control'" scripts/setup-telegram-platform.mjs
          grep -q "command: 'id'" scripts/setup-telegram-platform.mjs
          grep -q "{ command: 'software'" src/dyrakarmy_arena_commands.ts
          grep -q "{ command: 'games'" src/dyrakarmy_arena_commands.ts
      - name: Enforce safe remote-management and collectible boundary
        run: |
          if grep -R -n -E 'eval\(|new Function\(' src/platform_control.ts src/platform_governance.ts src/software_catalog.ts src/software_telegram.ts src/challenge_games.ts public/control public/control-v2 public/platform/product-redesign-v20.js public/telegram/telegram-product-v20.js public/games/challenge public/games/archive-raid; then
            echo 'Executable code construction is forbidden.'
            exit 1
          fi
          if grep -R -n -E 'javascript:|data:text/html' public/control public/control-v2 public/platform/product-redesign-v20.js public/telegram/telegram-product-v20.js public/games/challenge public/games/archive-raid src/platform_control.ts src/platform_governance.ts src/software_catalog.ts src/software_telegram.ts; then
            echo 'Unsafe URL schemes are forbidden.'
            exit 1
          fi
          if grep -R -n -E 'bot[0-9]{5,}:[A-Za-z0-9_-]{20,}' public src migrations; then
            echo 'A Telegram token-like value was found in source.'
            exit 1
          fi
          if grep -R -n -E 'widevine|playplay|decrypt|decryption_key|content_key|license_challenge' src/archive_raid.ts public/games/archive-raid migrations/0015_archive_raid_v1.sql; then
            echo 'Archive Raid must remain a virtual collectible system only.'
            exit 1
          fi
      - name: Wrangler packaging dry-run
        run: npx wrangler deploy --dry-run --config wrangler.jsonc --outdir .wrangler-unified-dry-run
