name: Apply Archive Raid Type Fix

on:
  pull_request:
    branches:
      - main
    paths:
      - .github/workflows/apply-archive-raid-typefix.yml

permissions:
  contents: write

jobs:
  patch:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: feature/archive-raid-v1
          fetch-depth: 0

      - name: Patch inventory quantity type
        shell: python
        run: |
          from pathlib import Path

          source = Path('worker/src/archive_raid.ts')
          text = source.read_text(encoding='utf-8')
          before = "collection: { unique: inventory.length, total: inventory.reduce((sum, item) => sum + Number(item.quantity || 0), 0), catalog_total: ARCHIVE_RAID_CARDS.length },"
          after = "collection: { unique: inventory.length, total: inventory.reduce((sum, item) => sum + Number((item as Record<string, unknown>).quantity || 0), 0), catalog_total: ARCHIVE_RAID_CARDS.length },"
          if before not in text:
              raise SystemExit('Expected inventory expression was not found')
          source.write_text(text.replace(before, after), encoding='utf-8')

          Path('.github/workflows/archive-raid-typecheck-diagnostics.yml').unlink(missing_ok=True)
          Path('.github/workflows/apply-archive-raid-typefix.yml').unlink()

      - name: Verify and typecheck
        working-directory: worker
        run: |
          grep -q "item as Record<string, unknown>" src/archive_raid.ts
          npm ci
          npm run typecheck

      - name: Commit fix
        run: |
          git config user.name "download-killer-tests"
          git config user.email "actions@users.noreply.github.com"
          git add worker/src/archive_raid.ts .github/workflows/archive-raid-typecheck-diagnostics.yml .github/workflows/apply-archive-raid-typefix.yml
          git commit -m "Fix Archive Raid inventory quantity type"
          git push origin HEAD:feature/archive-raid-v1
