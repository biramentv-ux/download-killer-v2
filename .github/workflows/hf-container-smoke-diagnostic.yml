name: Hugging Face Container Smoke Diagnostic

on:
  pull_request:
    paths:
      - hf_space/**
      - .github/workflows/hf-container-smoke-diagnostic.yml
      - .github/workflows/hugging-face-space.yml
  workflow_dispatch:

permissions:
  contents: read

jobs:
  diagnose:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          show-progress: false

      - name: Prepare deterministic Space bundle
        run: |
          rm -rf .hf-stage
          mkdir -p .hf-stage
          rsync -a --delete \
            --exclude node_modules \
            --exclude .wrangler \
            --exclude .dev.vars \
            worker/ .hf-stage/worker/
          cp hf_space/platform_hf.ts .hf-stage/worker/src/platform_hf.ts
          cp hf_space/wrangler.hf.jsonc .hf-stage/worker/wrangler.hf.jsonc
          rm -f .hf-stage/worker/src/platform_hf.test.ts
          cp hf_space/README.md .hf-stage/README.md
          cp hf_space/Dockerfile .hf-stage/Dockerfile
          cp hf_space/start.sh .hf-stage/start.sh
          cp hf_space/render-dev-vars.mjs .hf-stage/render-dev-vars.mjs
          cp hf_space/DEPLOYMENT_TRIGGER.txt .hf-stage/DEPLOYMENT_TRIGGER.txt

      - name: Build and inspect container
        shell: bash
        run: |
          set +e
          image="dyrakarmy-hf-diagnostic:${GITHUB_SHA}"
          docker build --tag "$image" .hf-stage > hf-container-build.log 2>&1
          build_status=$?
          echo "$build_status" > hf-container-build.status
          if [[ "$build_status" -ne 0 ]]; then
            exit 0
          fi

          docker run -d --name dyrakarmy-hf-diagnostic -p 17860:7860 "$image" > hf-container-id.txt 2>&1
          run_status=$?
          echo "$run_status" > hf-container-run.status
          if [[ "$run_status" -ne 0 ]]; then
            exit 0
          fi

          ready=0
          for attempt in $(seq 1 90); do
            code="$(curl -sS -o hf-health.json -w '%{http_code}' --max-time 10 http://127.0.0.1:17860/api/hf-mirror/health || true)"
            echo "attempt=$attempt code=$code" >> hf-ready.log
            if [[ "$code" == "200" ]] && grep -q 'cloudflare-mirror' hf-health.json; then
              ready=1
              break
            fi
            sleep 2
          done
          echo "$ready" > hf-ready.status

          for spec in \
            'home|/' \
            'health|/api/health' \
            'catalog|/api/software/releases' \
            'game|/games/queue-commander/' \
            'telegram|/api/telegram/v12/health' \
            'governance|/api/platform/governance/health'; do
            name="${spec%%|*}"
            path="${spec#*|}"
            curl -sS -D "hf-${name}.headers" -o "hf-${name}.body" -w '%{http_code}\n' --max-time 60 "http://127.0.0.1:17860${path}" > "hf-${name}.status" 2> "hf-${name}.curl-error" || true
          done

          docker logs dyrakarmy-hf-diagnostic > hf-container.log 2>&1 || true
          docker inspect dyrakarmy-hf-diagnostic > hf-container-inspect.json 2>&1 || true
          docker rm -f dyrakarmy-hf-diagnostic >/dev/null 2>&1 || true

          {
            echo '=== READY ==='
            cat hf-ready.status hf-ready.log 2>/dev/null || true
            for name in home health catalog game telegram governance; do
              echo "=== $name ==="
              cat "hf-${name}.status" 2>/dev/null || true
              head -c 1000 "hf-${name}.body" 2>/dev/null || true
              echo
              cat "hf-${name}.curl-error" 2>/dev/null || true
            done
            echo '=== CONTAINER LOG TAIL ==='
            tail -n 120 hf-container.log 2>/dev/null || true
          } > hf-smoke-summary.txt
          cat hf-smoke-summary.txt
          exit 0

      - name: Upload container diagnostics
        uses: actions/upload-artifact@v4
        with:
          name: hf-container-smoke-diagnostic
          path: |
            hf-*.log
            hf-*.status
            hf-*.json
            hf-*.headers
            hf-*.body
            hf-*.curl-error
            hf-smoke-summary.txt
            hf-container-id.txt
          if-no-files-found: error
