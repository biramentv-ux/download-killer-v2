name: Telegram Platform Checks

on:
  pull_request:
    paths:
      - worker/src/telegram_platform.ts
      - worker/src/telegram_platform.test.ts
      - worker/src/telegram_master_menu.ts
      - worker/src/telegram_master_menu.test.ts
      - worker/src/platform_v2.ts
      - worker/src/platform_v3.ts
      - worker/src/platform_governance.ts
      - worker/public/telegram/**
      - worker/public/control-v2/**
      - worker/scripts/setup-telegram-platform.mjs
      - worker/migrations/0011_telegram_platform_v10.sql
      - worker/migrations/0017_platform_governance_v2.sql
      - worker/wrangler.jsonc
      - worker/package.json
      - worker/public/manifest.webmanifest
      - TELEGRAM_PLATFORM_V10.md
      - .github/workflows/telegram-platform-check.yml
  push:
    branches:
      - main
    paths:
      - worker/src/telegram_platform.ts
      - worker/src/telegram_platform.test.ts
      - worker/src/telegram_master_menu.ts
      - worker/src/telegram_master_menu.test.ts
      - worker/src/platform_v2.ts
      - worker/src/platform_v3.ts
      - worker/src/platform_governance.ts
      - worker/public/telegram/**
      - worker/public/control-v2/**
      - worker/scripts/setup-telegram-platform.mjs
      - worker/migrations/0011_telegram_platform_v10.sql
      - worker/migrations/0017_platform_governance_v2.sql
      - worker/wrangler.jsonc
      - worker/package.json
      - worker/public/manifest.webmanifest
      - TELEGRAM_PLATFORM_V10.md
      - .github/workflows/telegram-platform-check.yml

jobs:
  validate:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: worker
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm
          cache-dependency-path: worker/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Typecheck Worker
        run: npm run typecheck

      - name: Run Worker tests
        run: npm test

      - name: Validate Mini App JavaScript and setup script
        run: |
          node --check public/telegram/telegram.js
          node --check public/control-v2/control-v2.js
          node --check scripts/setup-telegram-platform.mjs

      - name: Validate Telegram platform boundaries
        run: |
          node - <<'NODE'
          const fs = require('node:fs');
          const html = fs.readFileSync('public/telegram/index.html', 'utf8');
          const css = fs.readFileSync('public/telegram/telegram.css', 'utf8');
          const js = fs.readFileSync('public/telegram/telegram.js', 'utf8');
          const controlV2 = fs.readFileSync('public/control-v2/control-v2.js', 'utf8');
          const backend = fs.readFileSync('src/telegram_platform.ts', 'utf8');
          const backendTest = fs.readFileSync('src/telegram_platform.test.ts', 'utf8');
          const master = fs.readFileSync('src/telegram_master_menu.ts', 'utf8');
          const masterTest = fs.readFileSync('src/telegram_master_menu.test.ts', 'utf8');
          const entryV2 = fs.readFileSync('src/platform_v2.ts', 'utf8');
          const entryV3 = fs.readFileSync('src/platform_v3.ts', 'utf8');
          const governance = fs.readFileSync('src/platform_governance.ts', 'utf8');
          const wrangler = fs.readFileSync('wrangler.jsonc', 'utf8');
          const setup = fs.readFileSync('scripts/setup-telegram-platform.mjs', 'utf8');
          const migration = fs.readFileSync('migrations/0011_telegram_platform_v10.sql', 'utf8');
          const governanceMigration = fs.readFileSync('migrations/0017_platform_governance_v2.sql', 'utf8');
          const manifest = JSON.parse(fs.readFileSync('public/manifest.webmanifest', 'utf8'));

          for (const marker of [
            'id="downloadForm"', 'id="searchForm"', 'id="queueList"',
            'id="historyList"', 'id="archiveFiles"',
            'https://telegram.org/js/telegram-web-app.js', '@dyrakarmy_bot',
          ]) {
            if (!html.includes(marker)) throw new Error(`Missing Mini App marker: ${marker}`);
          }

          for (const endpoint of [
            '/api/telegram/v10/config', '/api/telegram/v10/handoff',
            '/api/telegram/v10/miniapp/profile', '/api/telegram/v10/miniapp/download',
            '/api/telegram/v10/miniapp/send-job',
          ]) {
            if (!backend.includes(endpoint)) throw new Error(`Missing backend endpoint: ${endpoint}`);
          }

          for (const command of [
            "command: 'menu'", "command: 'search'", "command: 'download'",
            "command: 'myfiles'", "command: 'share'", "command: 'queue'",
            "command: 'history'", "command: 'formats'", "command: 'settings'",
            "command: 'language'", "command: 'site'", "command: 'help'",
          ]) {
            if (!master.includes(command)) throw new Error(`Missing master command: ${command}`);
          }

          for (const menuMarker of [
            'Главно меню', 'Формати и качество', 'Споделяне на моите песни',
            'switch_inline_query_chosen_chat', 'allow_bot_chats',
            "telegramRequest('answerInlineQuery'", 'tg:v10:lang:',
            's:downloads', 's:captions', 'parseShareMediaId',
          ]) {
            if (!master.includes(menuMarker)) throw new Error(`Missing master menu marker: ${menuMarker}`);
          }
          if (!masterTest.includes("parseShareMediaId('share:42')")) throw new Error('Master menu share parser test is missing');

          for (const storageMarker of [
            'telegram_media_objects', 'telegram_user_links', 'copyMessage',
            'telegram_file_id', 'channel_message_id', 'file_unique_id',
          ]) {
            if (!backend.includes(storageMarker) && !migration.includes(storageMarker) && !master.includes(storageMarker)) {
              throw new Error(`Missing Telegram storage marker: ${storageMarker}`);
            }
          }

          if (!backend.includes("const TELEGRAM_URL_UPLOAD_LIMIT = 20 * 1024 * 1024")) throw new Error('Hosted Bot API URL upload limit is not encoded');
          if (!backend.includes("const TELEGRAM_DEFAULT_UPLOAD_LIMIT = 50 * 1024 * 1024")) throw new Error('Hosted Bot API multipart default is not encoded');
          if (!backend.includes('validateTelegramInitData')) throw new Error('Mini App initData validation is missing');
          if (!backend.includes('secretKeyBytes')) throw new Error('Telegram HMAC validation is incomplete');
          if (!backend.includes('tg://resolve?domain=${cleanUsername}')) throw new Error('Native Telegram handoff links are missing');
          if (!backendTest.includes("tg://resolve?domain=dyrakarmy_bot")) throw new Error('Native handoff tests are missing');
          if (!master.includes('X-Telegram-Bot-Api-Secret-Token')) throw new Error('Master webhook secret validation is missing');
          if (!entryV2.includes('handleTelegramMasterWebhook')) throw new Error('Telegram master webhook wrapper is not active');
          if (!entryV2.includes('ensureTelegramMasterCommands')) throw new Error('Master command synchronization is not active');
          if (!entryV3.includes("import platformV2 from './platform_v2'")) throw new Error('Platform v3 does not preserve the Telegram v2 runtime');
          if (!entryV3.includes('handlePlatformGovernanceTelegramWebhook')) throw new Error('Governance Telegram device-link wrapper is missing');
          if (!entryV3.includes('return platformV2.fetch')) throw new Error('Platform v3 does not delegate to platform v2');
          if (!governance.includes("command === '/link'")) throw new Error('Telegram /link command is missing');
          if (!governance.includes("command === '/control'")) throw new Error('Governance /control command is missing');
          if (!governance.includes('X-Telegram-Bot-Api-Secret-Token')) throw new Error('Governance webhook secret validation is missing');
          if (!governance.includes('sha256Hex')) throw new Error('Governance sessions are not hashed');
          if (!controlV2.includes('identity.link.start')) throw new Error('Control Center v2 device-link flow is missing');
          if (!wrangler.includes('"main": "src/platform_v3.ts"')) throw new Error('Wrangler does not use platform_v3 entrypoint');
          if (!wrangler.includes('"TELEGRAM_BOT_USERNAME": "dyrakarmy_bot"')) throw new Error('Sole target bot username is not configured');
          if (!css.includes('@media (prefers-reduced-motion: reduce)')) throw new Error('Reduced-motion support is missing');
          if (!js.includes('Telegram.WebApp')) throw new Error('Telegram Mini App SDK integration is missing');
          if (!js.includes('/miniapp/download') || !js.includes('/miniapp/profile')) throw new Error('Mini App API integration is missing');
          if (!setup.includes('process.env.TELEGRAM_BOT_TOKEN')) throw new Error('Setup script does not read token from environment');
          if (!setup.includes("'inline_query'")) throw new Error('Webhook setup does not subscribe to inline queries');
          if (!setup.includes('/setinline')) throw new Error('Inline mode activation guidance is missing');
          if (setup.includes('123456789:') || setup.includes('bot_token=')) throw new Error('A token-like literal was committed');
          if (!migration.includes('CREATE TABLE IF NOT EXISTS telegram_media_objects')) throw new Error('D1 Telegram migration is incomplete');
          if (!governanceMigration.includes('CREATE TABLE IF NOT EXISTS platform_sessions')) throw new Error('D1 governance session migration is incomplete');
          if (backend.includes('download_killerBOT') || master.includes('download_killerBOT') || html.includes('download_killerBOT') || js.includes('download_killerBOT') || governance.includes('download_killerBOT')) {
            throw new Error('Retired bot username is still present');
          }

          const shortcut = (manifest.shortcuts || []).find((item) => item.url === '/telegram/');
          if (!shortcut) throw new Error('Telegram Mini App PWA shortcut is missing');
          console.log('Single Telegram bot, native handoff, storage, governance device linking and inline sharing boundaries validated.');
          NODE
